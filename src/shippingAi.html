<!-- 
  shipping.html から分離したAI解析関連のJavaScript
  - AI入力アシスタント機能
  - 顧客/発送先マスタ照合
  - 商品マッピング学習
  - セッション管理
-->
<script>
    // ===== AI解析 グローバル変数 =====
    let aiAnalysisResult = null;
    let useShippingToMaster = false;
    let useCustomerMaster = false;
    let selectedFile = null;
    let selectedFileBase64 = null;
    let currentTab = 'text';
    let productMaster = {};
    let categoryList = [];
    let productPrices = {};
    let itemEdits = {};

    // 手動選択データ
    let manualCustomerSelection = null;
    let manualShippingToSelection = null;

    const AI_SESSION_KEY = 'aiSessionData';
    const AI_EXCLUDE_CATEGORIES = ['送料', '手数料', '追加料金'];
    const AI_EXCLUDE_PRODUCTS = ['送料', 'クール便追加', '代引手数料', '梱包料'];

    /**
     * 手動選択後にAIモーダル表示を更新
     */
    function updateManualSelectionDisplay() {
      if (!aiAnalysisResult) return;
      if (aiAnalysisResult.customer) {
        displayCustomer(aiAnalysisResult.customer);
      }
      if (aiAnalysisResult.shippingTo) {
        displayShippingTo(aiAnalysisResult.shippingTo);
      }
    }

    /**
     * 郵便番号のハイフンを除去
     */
    function sanitizeZipcode(zip) {
      if (!zip) return '';
      return String(zip).replace(/[-ー−‐]/g, '');
    }

    /**
     * 電話番号・FAX番号のハイフンを除去
     */
    function sanitizeTel(tel) {
      if (!tel) return '';
      return String(tel).replace(/[-ー−‐]/g, '');
    }

    /**
     * 住所文字列を都道府県＋市区町村(住所1)と番地以降(住所2)に分割
     */
    function splitAddressString(fullAddress) {
      if (!fullAddress) {
        return { address1: '', address2: '' };
      }
      const addr = String(fullAddress).trim();
      const patterns = [
        /(.*?[都道府県].*?[市区町村郡])/,
        /(.*?[市区町村])/,
        /(.*?郡.*?[町村])/
      ];
      for (const pattern of patterns) {
        const match = addr.match(pattern);
        if (match) {
          const address1 = match[1];
          const address2 = addr.substring(address1.length).trim();
          return { address1, address2 };
        }
      }
      const halfIndex = Math.floor(addr.length / 2);
      return {
        address1: addr.substring(0, halfIndex),
        address2: addr.substring(halfIndex)
      };
    }

    /**
     * AIアシスタントパネルの開閉を切り替え
     *
     * AIアシスタントパネルの表示/非表示を切り替えます。
     * パネルを開いた際に商品マスタが未読み込みの場合は自動的にロードします。
     *
     * 処理フロー:
     * 1. パネルのopen/closeクラスをトグル
     * 2. ボタンテキストを「開く」↔「閉じる」で切り替え
     * 3. パネルを開いた際にcategoryListが空なら商品マスタをロード
     *
     * @returns {void}
     * @see loadProductMaster() - 商品マスタ読み込み処理
     */
    function toggleAIAssistant() {
      const body = document.getElementById('aiAssistantBody');
      const btn = document.getElementById('aiToggleBtn');
      body.classList.toggle('open');
      btn.textContent = body.classList.contains('open') ? '閉じる' : '開く';
      if (body.classList.contains('open') && categoryList.length === 0) {
        loadProductMaster();
      }
    }

    /**
     * AI取込一覧から遷移した場合に自動でモーダルを開いて解析結果を表示
     */
    function openAIModalWithResult(analysisData) {
      const body = document.getElementById('aiAssistantBody');
      const btn = document.getElementById('aiToggleBtn');
      if (!body.classList.contains('open')) {
        body.classList.add('open');
        btn.textContent = '閉じる';
      }
      if (categoryList.length === 0) {
        loadProductMaster();
      }
      google.script.run
        .withSuccessHandler(function(enhancedResultJson) {
          try {
            const enhancedData = JSON.parse(enhancedResultJson);
            aiAnalysisResult = enhancedData;
            showAIAnalyzedIndicator(new Date().toISOString());
            displayAnalysisResult(enhancedData);
            console.log('AI取込一覧からの解析結果を表示しました（マスタ照合済み）');
          } catch (e) {
            console.error('強化された解析結果のパースに失敗:', e);
            aiAnalysisResult = analysisData;
            displayAnalysisResult(analysisData);
          }
        })
        .withFailureHandler(function(error) {
          console.error('マスタ照合エラー:', error);
          aiAnalysisResult = analysisData;
          showAIAnalyzedIndicator(new Date().toISOString());
          displayAnalysisResult(analysisData);
        })
        .enhanceAnalysisResultFromTempOrder(JSON.stringify(analysisData));
    }

    /**
     * 新規登録ボタンのセットアップ
     */
    function setupNewRegistrationButtons(analysisData) {
      const existingCustomerBtns = document.getElementById('customerActionButtons');
      if (existingCustomerBtns) existingCustomerBtns.remove();
      const existingShippingBtns = document.getElementById('shippingToActionButtons');
      if (existingShippingBtns) existingShippingBtns.remove();

      if (analysisData.customer) {
        const isNew = analysisData.customer.isNewCustomer;
        const isPartial = analysisData.customer.masterMatch === 'partial';
        if (isNew || isPartial) {
          const customerSection = document.querySelector('#aiResultCustomerRaw').parentElement;
          const btnContainer = document.createElement('div');
          btnContainer.id = 'customerActionButtons';
          btnContainer.className = 'mt-2';
          btnContainer.style.display = 'flex';
          btnContainer.style.gap = '8px';

          const newBtn = document.createElement('button');
          newBtn.type = 'button';
          newBtn.className = 'btn btn-sm btn-primary';
          newBtn.textContent = '📝 新規登録';
          newBtn.onclick = function() { openNewCustomerFormWithAI(analysisData.customer); };
          btnContainer.appendChild(newBtn);

          const searchBtn = document.createElement('button');
          searchBtn.type = 'button';
          searchBtn.className = 'btn btn-sm btn-primary';
          searchBtn.textContent = '🔍 顧客を検索';
          searchBtn.onclick = function() { $('.customerSearchBtn_open').click(); };
          btnContainer.appendChild(searchBtn);

          customerSection.appendChild(btnContainer);
        }
      }

      if (analysisData.shippingTo) {
        const isNew = analysisData.shippingTo.isNewShippingTo;
        const isPartial = analysisData.shippingTo.masterMatch === 'partial';
        if (isNew || isPartial) {
          const shippingSection = document.querySelector('#aiResultShippingToRaw').parentElement;
          const btnContainer = document.createElement('div');
          btnContainer.id = 'shippingToActionButtons';
          btnContainer.className = 'mt-2';
          btnContainer.style.display = 'flex';
          btnContainer.style.gap = '8px';

          const newBtn = document.createElement('button');
          newBtn.type = 'button';
          newBtn.className = 'btn btn-sm btn-primary';
          newBtn.textContent = '📝 新規登録';
          newBtn.onclick = function() { openNewShippingToFormWithAI(analysisData.shippingTo); };
          btnContainer.appendChild(newBtn);

          const searchBtn = document.createElement('button');
          searchBtn.type = 'button';
          searchBtn.className = 'btn btn-sm btn-primary';
          searchBtn.textContent = '🔍 発送先を検索';
          searchBtn.onclick = function() { $('.shippingToSearchBtn_open').click(); };
          btnContainer.appendChild(searchBtn);

          shippingSection.appendChild(btnContainer);
        }
      }
    }

    /**
     * 顧客新規登録フォームを開いてAI解析値を事前入力
     *
     * AI解析結果から顧客データを抽出し、新規登録ダイアログに自動入力します。
     * ユーザーは内容を確認・修正して登録できます。
     *
     * 処理フロー:
     * 1. 顧客フォームをクリア
     * 2. AI解析データ（raw値優先）を各フィールドに設定
     *    - 会社名 → 顧客名（表示名にも同じ値）
     *    - 担当者名 → 識別名
     *    - 郵便番号 → ハイフン除去して設定
     *    - 住所 → splitAddressString()で住所1/住所2に分割
     *    - 電話番号/FAX → ハイフン除去して設定
     * 3. jQuery UIダイアログを開く（登録/キャンセルボタン付き）
     *
     * データ優先順位:
     * - raw値（AI読み取り）> 正規化済み値
     *
     * @param {Object} customerData - 顧客データオブジェクト（AI解析結果）
     * @returns {void}
     * @see clearCustomerForm() - フォームクリア処理
     * @see sanitizeZipcode() - 郵便番号正規化
     * @see sanitizeTel() - 電話番号正規化
     * @see splitAddressString() - 住所分割処理
     * @see addCustomer() - 顧客登録処理
     */
    function openNewCustomerFormWithAI(customerData) {
      console.log('顧客データ:', customerData);
      clearCustomerForm();

      const companyName = customerData.rawCompanyName || customerData.companyName || '';
      const personName = customerData.rawPersonName || customerData.personName || '';
      const zipcode = customerData.rawZipcode || customerData.zipcode || '';
      const address = customerData.rawAddress || customerData.address || '';
      const tel = customerData.rawTel || customerData.tel || '';
      const fax = customerData.rawFax || customerData.fax || '';

      if (companyName) {
        document.getElementById('customerNameDg').value = companyName;
        document.getElementById('customerShowNameDg').value = companyName;
      }
      if (personName) {
        document.getElementById('customerIdentDg').value = personName;
      }
      if (zipcode) {
        document.getElementById('customerZipcodeDg').value = sanitizeZipcode(zipcode);
      }
      if (address) {
        const splitAddress = splitAddressString(address);
        document.getElementById('customerAddress1Dg').value = splitAddress.address1;
        document.getElementById('customerAddress2Dg').value = splitAddress.address2;
      }
      if (tel) {
        document.getElementById('customerTelDg').value = sanitizeTel(tel);
      }
      if (fax) {
        document.getElementById('customerFaxDg').value = sanitizeTel(fax);
      }

      const dialog = $('.customer_dg');
      if (!dialog.hasClass('ui-dialog-content')) {
        dialog.dialog({
          title: "顧客新規登録",
          height: 500,
          modal: true,
          buttons: {
            "キャンセル": function() { $(this).dialog("close"); },
            "登録": function() { addCustomer(); }
          }
        });
      }
      dialog.dialog('open');
    }

    /**
     * 発送先新規登録フォームを開いてAI解析値を事前入力
     *
     * AI解析結果から発送先データを抽出し、新規登録ダイアログに自動入力します。
     * ユーザーは内容を確認・修正して登録できます。
     *
     * 処理フロー:
     * 1. 発送先フォームをクリア
     * 2. AI解析データ（raw値優先）を各フィールドに設定
     *    - 会社名 → 発送先名
     *    - 宛名 → 識別名
     *    - 郵便番号 → ハイフン除去して設定
     *    - 住所 → splitAddressString()で住所1/住所2に分割
     *    - 電話番号 → ハイフン除去して設定
     * 3. jQuery UIダイアログを開く（登録/キャンセルボタン付き）
     *
     * データ優先順位:
     * - raw値（AI読み取り）> 正規化済み値
     *
     * @param {Object} shippingToData - 発送先データオブジェクト（AI解析結果）
     * @returns {void}
     * @see clearShippingToForm() - フォームクリア処理
     * @see sanitizeZipcode() - 郵便番号正規化
     * @see sanitizeTel() - 電話番号正規化
     * @see splitAddressString() - 住所分割処理
     * @see addShippingTo() - 発送先登録処理
     */
    function openNewShippingToFormWithAI(shippingToData) {
      console.log('発送先データ:', shippingToData);
      clearShippingToForm();

      const companyName = shippingToData.rawCompanyName || shippingToData.companyName || '';
      const personName = shippingToData.rawPersonName || shippingToData.personName || '';
      const zipcode = shippingToData.rawZipcode || shippingToData.zipcode || '';
      const address = shippingToData.rawAddress || shippingToData.address || '';
      const tel = shippingToData.rawTel || shippingToData.tel || '';

      if (companyName) {
        document.getElementById('shippingToNameDg').value = companyName;
      }
      if (personName) {
        document.getElementById('shippingToIdentDg').value = personName;
      }
      if (zipcode) {
        document.getElementById('shippingToZipcodeDg').value = sanitizeZipcode(zipcode);
      }
      if (address) {
        const splitAddress = splitAddressString(address);
        document.getElementById('shippingToAddress1Dg').value = splitAddress.address1;
        document.getElementById('shippingToAddress2Dg').value = splitAddress.address2;
      }
      if (tel) {
        document.getElementById('shippingToTelDg').value = sanitizeTel(tel);
      }

      const dialog = $('.shippingTo_dg');
      if (!dialog.hasClass('ui-dialog-content')) {
        dialog.dialog({
          title: "発送先新規登録",
          height: 500,
          modal: true,
          buttons: {
            "キャンセル": function() { $(this).dialog("close"); },
            "登録": function() { addShippingTo(); }
          }
        });
      }
      dialog.dialog('open');
    }

    /**
     * 顧客フォームをクリア
     */
    function clearCustomerForm() {
      document.getElementById('customerNameDg').value = '';
      document.getElementById('customerShowNameDg').value = '';
      document.getElementById('customerFuriganaDg').value = '';
      document.getElementById('customerDepDg').value = '';
      document.getElementById('customerPostDg').value = '';
      document.getElementById('customerIdentDg').value = '';
      document.getElementById('customerZipcodeDg').value = '';
      document.getElementById('customerAddress1Dg').value = '';
      document.getElementById('customerAddress2Dg').value = '';
      document.getElementById('customerTelDg').value = '';
      document.getElementById('customerPhoneDg').value = '';
      document.getElementById('customerFaxDg').value = '';
      document.getElementById('customerMailDg').value = '';

    /**
     * 発送先フォームをクリア
     */
    function clearShippingToForm() {
      document.getElementById('shippingToNameDg').value = '';
      document.getElementById('shippingToDepDg').value = '';
      document.getElementById('shippingToIdentDg').value = '';
      document.getElementById('shippingToZipcodeDg').value = '';
      document.getElementById('shippingToAddress1Dg').value = '';
      document.getElementById('shippingToAddress2Dg').value = '';
      document.getElementById('shippingToTelDg').value = '';
      document.getElementById('shippingToMailDg').value = '';
      document.getElementById('shippingToMemoDg').value = '';
    }

    /**
     * 商品マスタを読み込み（カテゴリ別・価格付き）
     *
     * サーバーサイドから商品マスタをカテゴリ別に取得し、
     * グローバル変数に保存します。商品選択ドロップダウンと価格自動入力に使用されます。
     *
     * 取得データ:
     * - productsByCategory: カテゴリごとの商品リスト { "野菜": ["トマト", "キュウリ"], ... }
     * - productPrices: 商品名と価格のマップ { "トマト": 500, ... }
     *
     * グローバル変数への保存:
     * - productMaster: カテゴリ別商品リスト
     * - productPrices: 商品価格マップ
     * - categoryList: カテゴリ名配列
     *
     * 呼び出しタイミング:
     * - AIアシスタントパネルを初めて開いた時（toggleAIAssistant）
     * - AI取込一覧から遷移した時（openAIModalWithResult）
     *
     * @returns {void}
     * @see getProductMasterForUI() - サーバーサイド取得関数
     * @see toggleAIAssistant() - パネル開閉処理
     */
    function loadProductMaster() {
      google.script.run
        .withSuccessHandler(function(data) {
          productMaster = data.productsByCategory || {};
          productPrices = data.productPrices || {};
          categoryList = Object.keys(productMaster);
        })
        .withFailureHandler(function(error) {
          console.error('商品マスタ取得エラー:', error);
        })
        .getProductMasterForUI();
    }
    
    /**
     * AIセッションデータの読み込み（30分間キャッシュ）
     *
     * sessionStorageからAI解析結果を読み込み、有効期限をチェックします。
     * 30分以内のデータであれば解析済みインジケーターを表示します。
     *
     * 処理フロー:
     * 1. sessionStorageからデータを取得
     * 2. データがない場合は何もせず終了
     * 3. データをパースし、解析時刻との差分を計算
     * 4. 30分以上経過していればデータを削除して終了
     * 5. 30分以内であれば解析済みインジケーターを表示
     *
     * エラーハンドリング:
     * - パースエラー時は破損データを削除
     *
     * @returns {void}
     * @see saveAISessionData() - セッション保存処理
     * @see showAIAnalyzedIndicator() - インジケーター表示処理
     */
    function loadAISessionData() {
      const saved = sessionStorage.getItem(AI_SESSION_KEY);
      if (!saved) return;
      try {
        const data = JSON.parse(saved);
        const diffMinutes = (new Date() - new Date(data.analyzedAt)) / 1000 / 60;
        if (diffMinutes > 30) {
          sessionStorage.removeItem(AI_SESSION_KEY);
          return;
        }
        showAIAnalyzedIndicator(data.analyzedAt);
      } catch (e) {
        sessionStorage.removeItem(AI_SESSION_KEY);
      }
    }
    
    /**
     * AIセッションデータの保存（30分間有効）
     *
     * 現在のAI解析結果と商品編集内容をsessionStorageに保存します。
     * 30分間キャッシュされ、ページ更新時に解析済みインジケーターを表示できます。
     *
     * 保存内容:
     * - analyzedAt: 解析実行時刻（ISO 8601形式）
     * - analysisResult: AI解析の完全な結果オブジェクト
     * - items: 商品編集内容（原文テキスト、商品名、価格、数量など）
     * - totalAmount: 合計金額（除外カテゴリ・商品を除く）
     *
     * 除外ルール:
     * - カテゴリ: 送料、手数料、追加料金
     * - 商品: 送料、クール便追加、代引手数料、梱包料
     *
     * @returns {void}
     * @see loadAISessionData() - セッション読み込み処理
     * @see AI_SESSION_KEY - セッションストレージキー定数
     * @see AI_EXCLUDE_CATEGORIES - 除外カテゴリ定義
     * @see AI_EXCLUDE_PRODUCTS - 除外商品定義
     */
    function saveAISessionData() {
      if (!aiAnalysisResult) return;
      const sessionData = {
        analyzedAt: new Date().toISOString(),
        analysisResult: aiAnalysisResult,
        items: [],
        totalAmount: 0
      };
      Object.keys(itemEdits).forEach(index => {
        const edit = itemEdits[index];
        if (edit.productName) {
          const amount = (edit.price || 0) * (edit.quantity || 0);
          if (!AI_EXCLUDE_CATEGORIES.includes(edit.category) && !AI_EXCLUDE_PRODUCTS.includes(edit.productName)) {
            sessionData.totalAmount += amount;
          }
          sessionData.items.push({
            originalText: edit.originalText,
            productName: edit.productName,
            category: edit.category,
            price: edit.price,
            quantity: edit.quantity
          });
        }
      });
      sessionStorage.setItem(AI_SESSION_KEY, JSON.stringify(sessionData));
    }
    
    /**
     * AI解析済みインジケーターの表示
     */
    function showAIAnalyzedIndicator(analyzedAt) {
      const indicator = document.getElementById('aiAnalyzedIndicator');
      const timeEl = document.getElementById('aiAnalyzedTime');
      if (indicator && analyzedAt) {
        const time = new Date(analyzedAt);
        timeEl.textContent = '（' + time.getHours() + ':' + String(time.getMinutes()).padStart(2,'0') + ' 解析）';
        indicator.classList.add('show');
      }
    }
    
    /**
     * AIセッションのクリア
     */
    function clearAISession() {
      sessionStorage.removeItem(AI_SESSION_KEY);
    }
    
    /**
     * タブ切り替え
     */
    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.ai-tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.ai-tab-content').forEach(content => content.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById(tab + 'Tab').classList.add('active');
    }
    
    /**
     * ファイル選択処理
     */
    function handleFileSelect(event) {
      const file = event.target.files[0];
      if (!file) return;
      selectedFile = file;
      const reader = new FileReader();
      reader.onload = function(e) {
        selectedFileBase64 = e.target.result.split(',')[1];
        showFilePreview(file);
      };
      reader.readAsDataURL(file);
    }
    
    /**
     * ファイルプレビュー表示
     */
    function showFilePreview(file) {
      const preview = document.getElementById('filePreview');
      const icon = file.type.includes('pdf') ? '📄' : '🖼️';
      const size = (file.size / 1024).toFixed(1) + ' KB';
      preview.innerHTML = '<div class="file-preview"><span class="file-icon">' + icon + '</span><div class="file-info"><div class="file-name">' + file.name + '</div><div class="file-size">' + size + '</div></div><button type="button" class="remove-btn" onclick="removeFile()">×</button></div>';
    }
    
    /**
     * ファイル削除
     */
    function removeFile() {
      selectedFile = null;
      selectedFileBase64 = null;
      document.getElementById('orderFile').value = '';
      document.getElementById('filePreview').innerHTML = '';
    }
    
    /**
     * ファイルドラッグ&ドロップ設定
     */
    function setupFileDragDrop() {
      const uploadArea = document.getElementById('fileUploadArea');
      if (!uploadArea) return;
      uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.classList.add('dragover'); });
      uploadArea.addEventListener('dragleave', () => { uploadArea.classList.remove('dragover'); });
      uploadArea.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadArea.classList.remove('dragover');
        const file = e.dataTransfer.files[0];
        if (file) {
          document.getElementById('orderFile').files = e.dataTransfer.files;
          handleFileSelect({ target: { files: [file] } });
        }
      });
    }
    
    /**
     * AI解析を実行（エントリーポイント）
     *
     * テキストまたはファイル（FAX/画像）をGemini APIで解析し、
     * 顧客・発送先・商品情報を自動抽出します。
     *
     * 処理フロー:
     * 1. 前回の解析結果をクリア
     * 2. currentTabに応じてテキストまたはファイル解析を実行
     * 3. サーバーサイド関数（analyzeOrderText/analyzeOrderFileBase64）を呼び出し
     * 4. 成功時: handleAnalysisSuccess()、失敗時: handleAnalysisError()
     *
     * @returns {void}
     */
    function analyzeWithAI() {
      const btn = document.getElementById('aiAnalyzeBtn');
      btn.classList.add('loading');
      btn.disabled = true;

      // 前の解析結果をクリア（UIステートのリセット）
      resetAnalysisState();

      if (currentTab === 'text') {
        const text = document.getElementById('aiInputText').value.trim();
        if (!text) { showWarningToast('テキストを入力してください'); btn.classList.remove('loading'); btn.disabled = false; return; }
        google.script.run.withSuccessHandler(handleAnalysisSuccess).withFailureHandler(handleAnalysisError).analyzeOrderText(text);
      } else {
        if (!selectedFile || !selectedFileBase64) { showWarningToast('ファイルを選択してください'); btn.classList.remove('loading'); btn.disabled = false; return; }
        google.script.run.withSuccessHandler(handleAnalysisSuccess).withFailureHandler(handleAnalysisError).analyzeOrderFileBase64(selectedFileBase64, selectedFile.type, selectedFile.name);
      }
    }
    
    /**
     * AI解析ステートをリセット（新規解析前のクリーンアップ）
     *
     * 次の解析実行前に、前回の解析結果とUI状態を完全にクリアします。
     * analyzeWithAI()の冒頭で呼び出されます。
     *
     * クリア対象:
     * - aiAnalysisResult: 解析結果オブジェクト
     * - useShippingToMaster/useCustomerMaster: マスタ使用フラグ
     * - itemEdits: 商品編集内容
     * - manualShippingToSelection/manualCustomerSelection: 手動選択データ
     * - 発送先/顧客セクションのUI（バッジ、マスタ表示、手動選択表示、ソース選択ボタン）
     * - 顧客推定候補エリア
     *
     * 保持されるもの:
     * - 入力テキスト（#aiInputText）
     * - 選択ファイル（selectedFile）
     *
     * @returns {void}
     * @see analyzeWithAI() - エントリーポイント
     */
    function resetAnalysisState() {
      aiAnalysisResult = null;
      useShippingToMaster = false;
      useCustomerMaster = false;
      itemEdits = {};
      manualShippingToSelection = null;
      manualCustomerSelection = null;
      
      // UIもクリア（但し入力テキストやファイルは保持）
      document.getElementById('aiResultArea').classList.remove('show');
      
      // 発送先セクションをクリア
      document.getElementById('shippingToMatchBadge').innerHTML = '';
      document.getElementById('aiResultShippingToRaw').innerHTML = '';
      document.getElementById('aiResultShippingToMaster').style.display = 'none';
      document.getElementById('aiResultShippingToManual').style.display = 'none';
      document.getElementById('shippingToSourceSelect').style.display = 'none';
      
      // 顧客セクションをクリア
      document.getElementById('customerMatchBadge').innerHTML = '';
      document.getElementById('aiResultCustomerRaw').innerHTML = '';
      document.getElementById('aiResultCustomerMaster').style.display = 'none';
      document.getElementById('aiResultCustomerManual').style.display = 'none';
      document.getElementById('customerSourceSelect').style.display = 'none';
      
      // 顧客推定候補をクリア
      const suggestionDiv = document.getElementById('customerSuggestionArea');
      if (suggestionDiv) suggestionDiv.style.display = 'none';
    }
    
    /**
     * AI解析成功時のコールバック関数
     *
     * Gemini APIからの解析結果を受け取り、パース後に画面表示します。
     * analyzeWithAI()のwithSuccessHandlerとして登録されています。
     *
     * 処理フロー:
     * 1. ローディング状態を解除（ボタン再有効化）
     * 2. 解析結果JSONをパース
     * 3. success=falseの場合はエラー表示
     * 4. success=trueの場合はdisplayAnalysisResult()で表示
     *
     * エラーハンドリング:
     * - JSONパースエラー時はエラーメッセージを表示
     * - API側のエラー（success=false）もキャッチして表示
     *
     * @param {string} result - JSON文字列（サーバーサイドからの返却値）
     * @returns {void}
     * @see analyzeWithAI() - エントリーポイント
     * @see displayAnalysisResult() - 結果表示処理
     */
    function handleAnalysisSuccess(result) {
      const btn = document.getElementById('aiAnalyzeBtn');
      btn.classList.remove('loading');
      btn.disabled = false;
      try {
        aiAnalysisResult = JSON.parse(result);
        if (!aiAnalysisResult.success) { showError(aiAnalysisResult.error || '解析に失敗しました'); return; }
        displayAnalysisResult(aiAnalysisResult);
      } catch (e) {
        showError('解析結果の処理に失敗: ' + e.message);
      }
    }
    
    /**
     * AI解析エラー時のコールバック関数
     *
     * Gemini API呼び出しやサーバーサイド処理でエラーが発生した際に呼び出されます。
     * analyzeWithAI()のwithFailureHandlerとして登録されています。
     *
     * 処理フロー:
     * 1. ローディング状態を解除（ボタン再有効化）
     * 2. エラーメッセージをshowError()で表示
     *
     * エラーの種類:
     * - Google Apps Script実行エラー
     * - Gemini APIエラー（API制限、認証失敗など）
     * - ネットワークエラー
     * - タイムアウト
     *
     * @param {Error} error - エラーオブジェクト
     * @returns {void}
     * @see analyzeWithAI() - エントリーポイント
     * @see showError() - エラー表示関数
     */
    function handleAnalysisError(error) {
      const btn = document.getElementById('aiAnalyzeBtn');
      btn.classList.remove('loading');
      btn.disabled = false;
      showError('解析エラー: ' + error.message);
    }
    
    /**
     * AI解析結果を画面に表示（メイン表示関数）
     *
     * Gemini APIからの解析結果を受け取り、UI全体を更新します。
     * 顧客、発送先、商品、日付などすべての解析情報を表示します。
     *
     * 表示内容:
     * - 全体信頼度バッジ（高/中/低）
     * - アラート情報（新規顧客/発送先など）
     * - 発送日、配送希望日、配送時間
     * - 発送先情報（displayShippingTo）
     * - 顧客情報（displayCustomer）
     * - 顧客推定候補（displayCustomerSuggestion、Phase 4）
     * - 商品リスト（編集可能、displayItemsEditable）
     * - メモ情報
     * - 学習サマリ
     * - 新規登録ボタン
     *
     * グローバル変数:
     * - itemEdits をクリア（商品編集状態の初期化）
     *
     * @param {Object} result - AI解析結果オブジェクト
     * @returns {void}
     * @see displayShippingTo() - 発送先表示処理
     * @see displayCustomer() - 顧客表示処理
     * @see displayCustomerSuggestion() - 顧客推定候補表示（Phase 4）
     * @see displayItemsEditable() - 商品リスト表示処理
     */
    function displayAnalysisResult(result) {
      document.getElementById('aiResultArea').classList.add('show');
      itemEdits = {};
      setConfidenceBadge('overallConfidence', result.overallConfidence);
      displayAlerts(result.alerts || []);
      document.getElementById('aiResultShippingDate').textContent = result.shippingDate || '指定なし';
      document.getElementById('aiResultDeliveryDate').textContent = result.deliveryDate || '指定なし';
      document.getElementById('aiResultDeliveryTime').textContent = result.deliveryTime || '指定なし';
      displayShippingTo(result.shippingTo);
      displayCustomer(result.customer);
      
      // 🤖 顧客推定候補を表示（顧客がnullでも表示するため、ここで呼び出し）
      displayCustomerSuggestion();
      
      displayItemsEditable(result.items, result.unknownItems);
      if (result.memo) {
        document.getElementById('memoSection').style.display = 'block';
        document.getElementById('aiResultMemo').textContent = result.memo;
      } else {
        document.getElementById('memoSection').style.display = 'none';
      }
      document.getElementById('aiError').style.display = 'none';
      updateLearnSummary();
      setupNewRegistrationButtons(result);
    }
    
    /**
     * アラート表示
     */
    function displayAlerts(alerts) {
      const container = document.getElementById('aiAlerts');
      container.innerHTML = alerts.map(a => '<div class="ai-alert-item ' + (a.includes('新規') || a.includes('見つかりません') ? 'ai-alert-warning' : 'ai-alert-info') + '">' + a + '</div>').join('');
    }
    
    /**
     * 発送先データを表示
     *
     * AI解析された発送先情報を表示します。
     * マスタマッチング状況に応じてバッジと選択肢を表示します。
     *
     * 表示内容:
     * - マッチング状態バッジ（新規/一致/部分一致/依頼先から設定）
     * - AI読み取り値（raw値: 会社名、宛名、郵便番号、住所、電話番号）
     * - マスタデータ（マッチした場合）
     * - 手動選択データ（検索または新規登録した場合）
     * - データソース選択ボタン（読み取り/マスタ/手動選択）
     *
     * データソース優先順位:
     * - 手動選択 > マスタ > AI読み取り
     *
     * マッチング状態:
     * - exact: 完全一致（✅）
     * - partial: 部分一致（⚠️）

      // 発送先がnullの場合は空表示にしてリターン

        badge.innerHTML = '';
        document.getElementById('aiResultShippingToRaw').innerHTML = '<div class="row"><span class="label">会社名：</span>-</div><div class="row"><span class="label">宛名：</span>-</div><div class="row"><span class="label">〒：</span>-</div><div class="row"><span class="label">住所：</span>-</div><div class="row"><span class="label">TEL：</span>-</div>';
        masterDiv.style.display = 'none';
        manualDiv.style.display = 'none';
        selectDiv.style.display = 'none';

      if (st.isNewShippingTo) {

      } else if (st.masterMatch === 'exact') {
        badge.innerHTML = '<span class="master-match-badge master-match-exact">✅ 一致</span>';
      } else if (st.masterMatch === 'partial') {
        badge.innerHTML = '<span class="master-match-badge master-match-partial">⚠️ 部分一致</span>';
      } else {
        badge.innerHTML = '';
      }
      document.getElementById('aiResultShippingToRaw').innerHTML = '<div class="row"><span class="label">会社名：</span>' + (st.rawCompanyName || '-') + '</div><div class="row"><span class="label">宛名：</span>' + (st.rawPersonName || '-') + '</div><div class="row"><span class="label">〒：</span>' + (st.rawZipcode || '-') + '</div><div class="row"><span class="label">住所：</span>' + (st.rawAddress || '-') + '</div><div class="row"><span class="label">TEL：</span>' + (st.rawTel || '-') + '</div>';

      if (manualShippingToSelection) {
        manualDiv.style.display = 'block';
        const sourceType = manualShippingToSelection.source === 'manual_registration' ? '新規登録' : '検索';
        manualDiv.innerHTML = '<strong>✋ 手動選択（' + sourceType + '）</strong><br>' +
          [manualShippingToSelection.companyName, manualShippingToSelection.personName].filter(Boolean).join(' ') +
          '<br>TEL: ' + (manualShippingToSelection.tel || '-') +
          '<br>〒' + (manualShippingToSelection.zipcode || '-') + ' ' + (manualShippingToSelection.address || '-');
      } else {
        manualDiv.style.display = 'none';
      }

      if (st.masterData) {
        masterDiv.style.display = 'block';
        masterDiv.innerHTML = '<strong>📁 マスタ（' + st.matchedBy + '）</strong><br>' + (st.masterData.companyName || '') + ' ' + (st.masterData.personName || '') + '<br>〒' + (st.masterData.zipcode || '') + ' ' + (st.masterData.address || '') + '<br>TEL: ' + (st.masterData.tel || '-');
        selectDiv.style.display = 'flex';

        if (manualShippingToSelection) {
          selectDiv.innerHTML = '<button type="button" class="source-select-btn" onclick="selectSource(\'shippingTo\',\'raw\')">📝 読み取り</button>' +
            '<button type="button" class="source-select-btn" onclick="selectSource(\'shippingTo\',\'master\')">📁 マスタ</button>' +
            '<button type="button" class="source-select-btn selected" onclick="selectSource(\'shippingTo\',\'manual\')">✋ 手動選択</button>';
          useShippingToMaster = false;
        } else {
          selectDiv.innerHTML = '<button type="button" class="source-select-btn" onclick="selectSource(\'shippingTo\',\'raw\')">📝 読み取り</button>' +
            '<button type="button" class="source-select-btn selected" onclick="selectSource(\'shippingTo\',\'master\')">📁 マスタ</button>';
          useShippingToMaster = true;
        }
      } else if (manualShippingToSelection) {
        masterDiv.style.display = 'none';
        selectDiv.style.display = 'flex';
        selectDiv.innerHTML = '<button type="button" class="source-select-btn" onclick="selectSource(\'shippingTo\',\'raw\')">📝 読み取り</button>' +
          '<button type="button" class="source-select-btn selected" onclick="selectSource(\'shippingTo\',\'manual\')">✋ 手動選択</button>';
        useShippingToMaster = false;
      } else {
        masterDiv.style.display = 'none';
        selectDiv.style.display = 'none';
        useShippingToMaster = false;
      }
    }
    
    /**
     * 顧客データを表示
     *
     * AI解析された顧客情報を表示します。
     * マスタマッチング状況に応じてバッジと選択肢を表示します。
     *
     * 表示内容:
     * - マッチング状態バッジ（新規/一致/部分一致）
     * - AI読み取り値（raw値: 会社名、担当者、電話番号、FAX番号）
     * - マスタデータ（マッチした場合）
     * - 手動選択データ（検索/新規登録/AI推定した場合）
     * - データソース選択ボタン（読み取り/マスタ/手動選択）
     * - FAX番号登録促進（displayFaxRegistrationPrompt）
     *
     * 手動選択のソースタイプ:
     * - manual_registration: 新規登録
     * - ai_suggestion: AI推定（Phase 4）
     * - manual: 検索
     *
     * 顧客名表示形式:
     * - 受注画面では常に「会社名　氏名」形式（displayNameは使用しない）
     *
     * @param {Object|null} cust - 顧客オブジェクト（nullの場合は空表示）
     * @returns {void}
     * @see displayFaxRegistrationPrompt() - FAX登録促進表示
     * @see selectSource() - データソース選択処理
     */
    function displayCustomer(cust) {
      const badge = document.getElementById('customerMatchBadge');
      const masterDiv = document.getElementById('aiResultCustomerMaster');
      const manualDiv = document.getElementById('aiResultCustomerManual');
      const selectDiv = document.getElementById('customerSourceSelect');
      
      // 顧客がnullの場合は空表示にしてリターン
      if (!cust) {
        badge.innerHTML = '';
        document.getElementById('aiResultCustomerRaw').innerHTML = '<div class="row"><span class="label">会社名：</span>-</div>' +
          '<div class="row"><span class="label">担当：</span>-</div>' +
          '<div class="row"><span class="label">TEL：</span>-</div>';
        masterDiv.style.display = 'none';
        manualDiv.style.display = 'none';
        selectDiv.style.display = 'none';
        useCustomerMaster = false;
        return;
      }
      
      if (cust.isNewCustomer) {
        badge.innerHTML = '<span class="new-badge">新規</span>';
      } else if (cust.masterMatch === 'exact') {
        badge.innerHTML = '<span class="master-match-badge master-match-exact">✅ 一致</span>';
      } else if (cust.masterMatch === 'partial') {
        badge.innerHTML = '<span class="master-match-badge master-match-partial">⚠️ 部分一致</span>';
      } else {
        badge.innerHTML = '';
      }
      // FAX番号も表示に追加
      let rawHtml = '<div class="row"><span class="label">会社名：</span>' + (cust.rawCompanyName || '-') + '</div>' +
        '<div class="row"><span class="label">担当：</span>' + (cust.rawPersonName || '-') + '</div>' +
        '<div class="row"><span class="label">TEL：</span>' + (cust.rawTel || '-') + '</div>';
      if (cust.rawFax) {
        rawHtml += '<div class="row"><span class="label">FAX：</span>' + cust.rawFax + '</div>';
      }
      document.getElementById('aiResultCustomerRaw').innerHTML = rawHtml;

      if (manualCustomerSelection) {
        manualDiv.style.display = 'block';
        const sourceType = manualCustomerSelection.source === 'manual_registration' ? '新規登録' :
                           manualCustomerSelection.source === 'ai_suggestion' ? 'AI推定' : '検索';
        // 受注画面では常に「会社名 氏名」形式で表示（displayNameは使わない）
        const customerName = [manualCustomerSelection.companyName, manualCustomerSelection.personName]
          .filter(Boolean).join('　');
        manualDiv.innerHTML = '<strong>✋ 手動選択（' + sourceType + '）</strong><br>' +
          customerName +
          '<br>TEL: ' + (manualCustomerSelection.tel || '-') +
          '<br>〒' + (manualCustomerSelection.zipcode || '-') + ' ' + (manualCustomerSelection.address || '-');
      } else {
        manualDiv.style.display = 'none';
      }

      if (cust.masterData) {
        masterDiv.style.display = 'block';
        masterDiv.innerHTML = '<strong>📁 マスタ（' + cust.matchedBy + '）</strong><br>' + (cust.masterData.displayName || cust.masterData.companyName || '') + '<br>TEL: ' + (cust.masterData.tel || '-');
        selectDiv.style.display = 'flex';

        if (manualCustomerSelection) {
          selectDiv.innerHTML = '<button type="button" class="source-select-btn" onclick="selectSource(\'customer\',\'raw\')">📝 読み取り</button>' +
            '<button type="button" class="source-select-btn" onclick="selectSource(\'customer\',\'master\')">📁 マスタ</button>' +
            '<button type="button" class="source-select-btn selected" onclick="selectSource(\'customer\',\'manual\')">✋ 手動選択</button>';
          useCustomerMaster = false;
        } else {
          selectDiv.innerHTML = '<button type="button" class="source-select-btn" onclick="selectSource(\'customer\',\'raw\')">📝 読み取り</button>' +
            '<button type="button" class="source-select-btn selected" onclick="selectSource(\'customer\',\'master\')">📁 マスタ</button>';
          useCustomerMaster = true;
        }
      } else if (manualCustomerSelection) {
        masterDiv.style.display = 'none';
        selectDiv.style.display = 'flex';
        selectDiv.innerHTML = '<button type="button" class="source-select-btn" onclick="selectSource(\'customer\',\'raw\')">📝 読み取り</button>' +
          '<button type="button" class="source-select-btn selected" onclick="selectSource(\'customer\',\'manual\')">✋ 手動選択</button>';

      } else {
        masterDiv.style.display = 'none';
        selectDiv.style.display = 'none';

      // 📠 FAX番号登録促進の表示
      displayFaxRegistrationPrompt(cust);
      
      // 🤖 AI推定候補の表示は displayAnalysisResult() で呼び出すため、ここでは不要
    }

    /**
     * FAX番号登録促進UIを表示
     *
     * AI解析でFAX番号を検出し、マッチした顧客マスタにFAX番号が未登録の場合、
     * ワンクリックでFAX番号を登録できるプロンプトを表示します。
     *
     * 表示条件（すべて満たす必要あり）:
     * - AI解析結果にFAX番号が含まれている（10桁以上）
     * - 顧客マスタとマッチしている（exact または partial）
     * - マッチした顧客マスタにFAX番号が未登録
     *
     * または:
     * - 手動選択した顧客にFAX番号が未登録
     * - AI解析結果にFAX番号が含まれている
     *
     * 表示内容:
     * - FAX番号（AIが読み取った値）
     * - 顧客名（マスタの表示名）
     * - 説明文（登録促進メッセージ）
     * - 登録ボタン（registerCustomerFax呼び出し）
     *
     * セキュリティ:
     * - escapeHtml()でXSS対策済み
     *
     * @param {Object} cust - 顧客オブジェクト
     * @returns {void}
     * @see registerCustomerFax() - FAX番号登録処理
     * @see escapeHtml() - HTMLエスケープ関数
     */
    function displayFaxRegistrationPrompt(cust) {
      const promptDiv = document.getElementById('faxRegistrationPrompt');
      if (!promptDiv) return;

      // 条件チェック
      const hasRawFax = cust.rawFax && sanitizeTel(cust.rawFax).length >= 10;
      const hasCustomerMatch = cust.masterMatch === 'exact' || cust.masterMatch === 'partial';
      const hasMasterData = cust.masterData;
      const masterHasNoFax = hasMasterData && !cust.masterData.fax;

      // 手動選択時も対応
      let targetCustomer = null;
      if (manualCustomerSelection && !manualCustomerSelection.fax && hasRawFax) {
        targetCustomer = manualCustomerSelection;
      } else if (hasRawFax && hasCustomerMatch && masterHasNoFax) {
        targetCustomer = cust.masterData;
      }

      if (!targetCustomer) {
        promptDiv.style.display = 'none';
        return;
      }

      // 表示
      promptDiv.style.display = 'block';
      const customerName = targetCustomer.displayName || 
        [targetCustomer.companyName, targetCustomer.personName].filter(Boolean).join('　');
      
      promptDiv.innerHTML = 
        '<div class="fax-header">📠 FAX番号の登録</div>' +
        '<div class="fax-number">' + escapeHtml(cust.rawFax) + '</div>' +
        '<div class="fax-description">' +
          '「' + escapeHtml(customerName) + '」のマスタにFAX番号が未登録です。<br>' +
          'この番号を登録すると、次回から自動でマッチングできます。' +
        '</div>' +
        '<button type="button" class="btn-register-fax" onclick="registerCustomerFax()">' +
          '✅ この顧客にFAX番号を登録' +
        '</button>';
    }

    /**
     * 顧客マスタにFAX番号を登録
     *
     * AI解析で検出されたFAX番号を既存の顧客マスタに追加登録します。
     * 登録成功後はプロンプトを非表示にし、マスタデータを更新します。
     *
     * 処理フロー:
     * 1. AI解析結果からFAX番号を取得
     * 2. 登録対象顧客を特定（手動選択 > マスタデータ）
     * 3. ボタンを無効化してローディング表示
     * 4. サーバーサイド関数（updateCustomerFax）を呼び出し
     * 5. 成功時: プロンプト非表示、マスタデータ更新、成功トースト表示
     * 6. 失敗時: ボタン再有効化、エラートースト表示
     *
     * 登録対象顧客の特定:
     * - manualCustomerSelection が存在すればそれを使用
     * - なければ cust.masterData を使用
     *
     * データ更新:
     * - aiAnalysisResult.customer.masterData.fax を更新
     * - manualCustomerSelection.fax を更新（該当時）
     *
     * @returns {void}
     * @see displayFaxRegistrationPrompt() - プロンプト表示処理
     * @see updateCustomerFax() - サーバーサイドFAX更新関数
     */
    function registerCustomerFax() {
      const cust = aiAnalysisResult?.customer;
      if (!cust || !cust.rawFax) {
        showWarningToast('FAX番号がありません');
        return;
      }

      // 登録対象の顧客を特定
      let targetCustomer = null;
      if (manualCustomerSelection) {
        targetCustomer = manualCustomerSelection;
      } else if (cust.masterData) {
        targetCustomer = cust.masterData;
      }

      if (!targetCustomer) {
        showWarningToast('登録対象の顧客が特定できません');
        return;
      }

      const customerDisplayName = targetCustomer.displayName || '';
      const customerCompanyName = targetCustomer.companyName || '';
      const customerPersonName = targetCustomer.personName || '';
      const faxNumber = cust.rawFax;

      // ボタンを無効化
      const btn = document.querySelector('.btn-register-fax');
      if (btn) {
        btn.disabled = true;
        btn.textContent = '登録中...';
      }

      google.script.run
        .withSuccessHandler(function(result) {
          if (result.success) {
            showSuccessToast('FAX番号を登録しました: ' + result.faxNumber);
            // 登録成功したらプロンプトを非表示に
            const promptDiv = document.getElementById('faxRegistrationPrompt');
            if (promptDiv) {
              promptDiv.style.display = 'none';
            }
            // マスタデータを更新
            if (cust.masterData) {
              cust.masterData.fax = result.faxNumber;
            }
            if (manualCustomerSelection) {
              manualCustomerSelection.fax = result.faxNumber;
            }
          } else {
            showWarningToast('登録失敗: ' + result.error);
            if (btn) {
              btn.disabled = false;
              btn.textContent = '✅ この顧客にFAX番号を登録';
            }
          }
        })
        .withFailureHandler(function(error) {
          showWarningToast('エラー: ' + error.message);
          if (btn) {
            btn.disabled = false;
            btn.textContent = '✅ この顧客にFAX番号を登録';
          }
        })
        .updateCustomerFax(customerDisplayName, customerCompanyName, customerPersonName, faxNumber);
    }

    /**
     * HTMLエスケープ
     */
    function escapeHtml(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    /**
     * AI顧客推定候補を表示（Phase 4）
     *
     * AI自動学習システムによる顧客推定結果を表示します。
     * 発送先名から過去の受注履歴と学習データを元に顧客を推定し、
     * 1クリックで適用できる候補を提示します。
     *
     * 表示内容:
     * - 主要候補（顧客名、信頼度、適用ボタン）
     * - 代替候補リスト（confidence 40%以上）
     * - 推定根拠（マッピング学習/受注履歴）
     *
     * セキュリティ:
     * - XSS対策のため、createElement() + textContent で安全に生成
     *
     * 信頼度の基準:
     * - 80%以上: 「推奨候補」として表示
     * - 40-79%: 「候補」として表示
     * - 40%未満: 表示しない
     *
     * @returns {void}
     * @see applyCustomerSuggestion() - 候補適用処理
     * @see estimateCustomerFromShippingTo() - サーバーサイド推定ロジック
     */
    function displayCustomerSuggestion() {
      const suggestionDiv = document.getElementById('aiResultCustomerSuggestion');

      // 推定結果がない場合は非表示
      if (!aiAnalysisResult || !aiAnalysisResult.customerEstimation || !aiAnalysisResult.customerEstimation.customer) {
        suggestionDiv.style.display = 'none';
        return;
      }

      const estimation = aiAnalysisResult.customerEstimation;
      const confidence = estimation.confidence || 0;
      const isHighConfidence = confidence >= 80;

      // コンテナをクリア
      suggestionDiv.innerHTML = '';
      suggestionDiv.style.display = 'block';

      // ヘッダー作成
      const header = document.createElement('div');
      header.className = 'ai-suggestion-header';
      const headerText = document.createElement('strong');
      headerText.textContent = isHighConfidence ? '🤖 推奨候補（自動学習）' : '🤖 候補（自動学習）';
      header.appendChild(headerText);
      suggestionDiv.appendChild(header);

      // 主要候補エリア
      const primaryDiv = document.createElement('div');
      primaryDiv.className = 'ai-suggestion-primary';

      // 顧客名
      const nameDiv = document.createElement('div');
      nameDiv.className = 'suggestion-customer-name';
      nameDiv.textContent = estimation.customer;
      primaryDiv.appendChild(nameDiv);

      // 信頼度とソース
      const confidenceDiv = document.createElement('div');
      confidenceDiv.className = 'suggestion-confidence';
      let confidenceText = '信頼度: ' + confidence + '%';
      if (estimation.sources && estimation.sources.length > 0) {
        const sourceLabels = {
          'mapping': 'マッピング学習',
          'order_history': '受注履歴'
        };
        const sourceText = estimation.sources.map(function(s) {
          return sourceLabels[s] || s;
        }).join(', ');
        confidenceText += ' (' + sourceText + ')';
      }
      confidenceDiv.textContent = confidenceText;
      primaryDiv.appendChild(confidenceDiv);

      // 適用ボタン
      const applyBtn = document.createElement('button');
      applyBtn.type = 'button';
      applyBtn.className = 'btn-apply-suggestion';
      applyBtn.textContent = '✅ この候補を適用';
      applyBtn.onclick = function() {
        applyCustomerSuggestion(estimation.customer);
      };
      primaryDiv.appendChild(applyBtn);

      suggestionDiv.appendChild(primaryDiv);

      // 代替候補（あれば）
      if (estimation.alternatives && estimation.alternatives.length > 0) {
        const altDiv = document.createElement('div');
        altDiv.className = 'ai-suggestion-alternatives';

        const altLabel = document.createElement('div');
        altLabel.className = 'alternatives-label';
        altLabel.textContent = '他の候補:';
        altDiv.appendChild(altLabel);

        const altList = document.createElement('ul');
        altList.className = 'alternatives-list';

        estimation.alternatives.forEach(function(alt) {
          const li = document.createElement('li');

          const nameSpan = document.createElement('span');
          nameSpan.className = 'alt-customer-name';
          nameSpan.textContent = alt.customer;
          li.appendChild(nameSpan);

          const confSpan = document.createElement('span');
          confSpan.className = 'alt-confidence';
          confSpan.textContent = ' (' + alt.confidence + '%) ';
          li.appendChild(confSpan);

          const altBtn = document.createElement('button');
          altBtn.type = 'button';
          altBtn.className = 'btn-apply-alt';
          altBtn.textContent = '適用';
          altBtn.onclick = function() {
            applyCustomerSuggestion(alt.customer);
          };
          li.appendChild(altBtn);

          altList.appendChild(li);
        });

        altDiv.appendChild(altList);
        suggestionDiv.appendChild(altDiv);
      }
    }

    /**
     * AI顧客推定候補を適用（1クリック適用機能、Phase 4）
     *
     * 表示された推定候補をクリックすることで、顧客情報をフォームに自動入力します。
     *
     * 処理フロー:
     * 1. 顧客マスタから詳細情報を取得（getCustomerByDisplayName）
     * 2. manualCustomerSelectionに保存（sourceは'ai_suggestion'）
     * 3. フォームに自動入力（顧客名、郵便番号、住所、電話番号）
     * 4. AI解析結果表示を更新
     *
     * データソース識別:
     * - source: 'ai_suggestion' を設定することで、AI推定由来であることを記録
     *
     * @param {string} customerName - 適用する顧客名（表示名、会社名、または会社名+氏名）
     * @returns {void}
     * @see getCustomerByDisplayName() - サーバーサイド顧客検索関数
     * @see displayCustomerSuggestion() - 候補表示処理
     */
    function applyCustomerSuggestion(customerName) {
      if (!customerName) {
        showToast('顧客名が指定されていません', 'error');
        return;
      }

      // ローディング表示
      showLoading('顧客情報を取得中...');

      // サーバーサイドから顧客情報を取得
      google.script.run
        .withSuccessHandler(function(customerData) {
          hideLoading();

          if (!customerData) {
            showToast('顧客情報が見つかりませんでした: ' + customerName, 'error');
            return;
          }

          // manualCustomerSelectionに保存
          manualCustomerSelection = {
            displayName: customerData.displayName || customerName,
            companyName: customerData.companyName || '',
            personName: customerData.personName || '',
            zipcode: customerData.zipcode || '',
            address: customerData.address || '',
            tel: customerData.tel || '',
            fax: customerData.fax || '',
            email: customerData.email || '',
            source: 'ai_suggestion' // ソースを識別
          };

          console.log('AI候補から選択した顧客データを保存:', manualCustomerSelection);

          // フォームに値を入力
          const companyName = customerData.companyName || '';
          const personName = customerData.personName || '';

          if (companyName) {
            document.querySelector('input[id="customerName"]').value = companyName + '　' + personName;
          } else {
            document.querySelector('input[id="customerName"]').value = personName;
          }

          document.querySelector('input[id="customerZipcode"]').value = customerData.zipcode || '';
          document.querySelector('input[id="customerAddress"]').value = customerData.address || '';
          document.querySelector('input[id="customerTel"]').value = customerData.tel || '';

          // AI解析結果の表示を更新
          if (aiAnalysisResult && aiAnalysisResult.customer) {
            displayCustomer(aiAnalysisResult.customer);
          }

          // 成功メッセージ
          showToast('顧客情報を適用しました: ' + customerName, 'success');

          // AIアシスタントを閉じる（オプション）
          // toggleAIAssistant();
        })
        .withFailureHandler(function(error) {
          hideLoading();
          console.error('顧客情報の取得に失敗:', error);
          showToast('顧客情報の取得に失敗しました', 'error');
        })
        .getCustomerByDisplayName(customerName);
    }

    /**
     * 編集可能な商品リストを表示
     *
     * AI解析で抽出された商品を編集可能なカード形式で表示します。
     * ユーザーはカテゴリ、商品名、規格、価格、数量を修正でき、
     * マッピング学習のチェックボックスで学習対象を選択できます。
     *
     * 表示内容（商品カードごと）:
     * - 原文テキスト（AI読み取り元）
     * - 信頼度バッジ（高/中/低）または学習済みバッジ
     * - 分類ドロップダウン（変更時に商品リストが更新される）
     * - 商品ドロップダウン（カテゴリ別＋他カテゴリ）
     * - 規格入力欄
     * - 価格入力欄（価格バッジ: AI読み取り/マスタ）
     * - 数量＋単位（ケース/本/袋/kg/個）
     * - 学習チェックボックス（未学習商品のみ、low信頼度は除外）
     *
     * 価格自動入力:
     * - AI読み取り価格がある場合: そのまま使用（バッジ: 顧客指定）
     * - ない場合、商品マスタに価格がある場合: マスタ価格を使用（バッジ: マスタ）
     *
     * 学習済み判定:
     * - mappingMatch.found && matchType === 'exact' → 学習済みバッジ表示
     * - 学習チェックボックスは非表示
     *
     * グローバル変数:
     * - itemEdits: 各商品の編集内容を保存
     *
     * @param {Array} items - 商品配列（AI解析結果）
     * @param {Array} unknownItems - 未認識商品配列（現在未使用）
     * @returns {void}
     * @see onCategoryChange() - カテゴリ変更ハンドラ
     * @see onProductChange() - 商品変更ハンドラ
     * @see toggleLearn() - 学習チェック切り替え
     * @see buildProductOptions() - 商品オプション生成
     */
    function displayItemsEditable(items, unknownItems) {
      const container = document.getElementById('aiResultItems');
      container.innerHTML = '';
      if (!items || items.length === 0) {
        container.innerHTML = '<p style="color:#999;">商品が見つかりませんでした</p>';
        return;
      }
      items.forEach((item, index) => {
        const mappingMatch = item.mappingMatch || {};
        const isLearned = mappingMatch.found && mappingMatch.matchType === 'exact';
        const canLearn = !isLearned && item.originalText;
        
        let price = 0;
        let priceSource = 'none';
        if (item.price && item.price > 0) {
          price = item.price;
          priceSource = item.priceSource || 'ai';
        } else if (item.productName && productPrices[item.productName]) {
          price = productPrices[item.productName];
          priceSource = 'master';
        }
        
        itemEdits[index] = {
          category: item.category || '',
          productName: item.productName || '',
          spec: item.spec || '',
          quantity: item.quantity || '',
          unit: item.unit || 'ケース',
          price: price,
          priceSource: priceSource,
          learn: canLearn && item.confidence !== 'low',
          originalText: item.originalText || '',
          originalProductName: item.productName || ''
        };
        
        const cardClass = isLearned ? 'learned' : '';
        let categoryOptions = '<option value="">選択...</option>';
        categoryList.forEach(cat => {
          categoryOptions += '<option value="' + cat + '" ' + (cat === item.category ? 'selected' : '') + '>' + cat + '</option>';
        });
        let productOptions = buildProductOptions(item.category, item.productName);
        
        let badgeHtml = '';
        if (isLearned) {
          badgeHtml = '<span class="mapping-badge">📚 学習済み（' + mappingMatch.usageCount + '回使用）</span>';
        } else {
          badgeHtml = '<span class="confidence-badge confidence-' + item.confidence + '">' + getConfidenceLabel(item.confidence) + '</span>';
        }
        
        let priceBadgeHtml = '';
        if (priceSource === 'ai') {
          priceBadgeHtml = '<span class="price-badge ai">顧客指定</span>';
        } else if (priceSource === 'master') {
          priceBadgeHtml = '<span class="price-badge master">マスタ</span>';
        }
        
        let learnHtml = '';
        if (canLearn) {
          const checked = itemEdits[index].learn ? 'checked' : '';
          learnHtml = '<div class="item-learn-row ' + (itemEdits[index].learn ? 'will-learn' : '') + '" id="learnRow_' + index + '"><input type="checkbox" id="learn_' + index + '" ' + checked + ' onchange="toggleLearn(' + index + ')"><label for="learn_' + index + '">この対応を記憶する</label><span class="learn-preview" id="learnPreview_' + index + '" style="' + (itemEdits[index].learn ? '' : 'display:none') + '">→ ' + (item.productName || '未選択') + '</span></div>';
        }
        
        container.innerHTML += '<div class="item-card ' + cardClass + '" id="itemCard_' + index + '"><div class="item-card-header"><span class="item-original-text">📝 ' + (item.originalText || '(原文なし)') + '</span>' + badgeHtml + '</div><div class="item-card-body"><div class="item-edit-row"><label>分類:</label><select id="category_' + index + '" onchange="onCategoryChange(' + index + ')">' + categoryOptions + '</select></div><div class="item-edit-row"><label>商品:</label><select id="product_' + index + '" onchange="onProductChange(' + index + ')">' + productOptions + '</select></div><div class="item-edit-row"><label>規格:</label><input type="text" id="spec_' + index + '" value="' + (item.spec || '') + '" onchange="onSpecChange(' + index + ')"></div><div class="item-edit-row"><label>価格:</label><div class="price-group"><input type="number" id="price_' + index + '" min="0" step="0.01" value="' + price + '" onchange="onPriceChange(' + index + ')"><span class="unit">円</span>' + priceBadgeHtml + '</div></div><div class="item-edit-row"><label>数量:</label><div class="quantity-group"><input type="number" id="quantity_' + index + '" value="' + (item.quantity || '') + '" min="0" step="0.1" onchange="onQuantityChange(' + index + ')"><select id="unit_' + index + '" onchange="onUnitChange(' + index + ')"><option value="ケース" ' + (item.unit === 'ケース' ? 'selected' : '') + '>ケース</option><option value="本" ' + (item.unit === '本' ? 'selected' : '') + '>本</option><option value="袋" ' + (item.unit === '袋' ? 'selected' : '') + '>袋</option><option value="kg" ' + (item.unit === 'kg' ? 'selected' : '') + '>kg</option><option value="個" ' + (item.unit === '個' ? 'selected' : '') + '>個</option></select></div></div>' + learnHtml + '</div></div>';
      });
    }
    
    /**
     * 商品オプション生成
     */
    function buildProductOptions(category, selectedProduct) {
      let options = '<option value="">選択...</option>';
      if (category && productMaster[category]) {
        productMaster[category].forEach(prod => {
          options += '<option value="' + prod + '" ' + (prod === selectedProduct ? 'selected' : '') + '>' + prod + '</option>';
        });
      }
      categoryList.forEach(cat => {
        if (cat !== category && productMaster[cat]) {
          options += '<optgroup label="── ' + cat + ' ──">';
          productMaster[cat].forEach(prod => {
            options += '<option value="' + prod + '" ' + (prod === selectedProduct ? 'selected' : '') + '>' + prod + '</option>';
          });
          options += '</optgroup>';
        }
      });
      return options;
    }
    
    /**
     * カテゴリ変更ハンドラ
     */
    function onCategoryChange(index) {
      const category = document.getElementById('category_' + index).value;
      itemEdits[index].category = category;
      const productSelect = document.getElementById('product_' + index);
      productSelect.innerHTML = buildProductOptions(category, '');
      itemEdits[index].productName = '';
      itemEdits[index].price = 0;
      document.getElementById('price_' + index).value = 0;
      checkModified(index);
      updateLearnSummary();
    }
    
    /**
     * 商品変更ハンドラ
     */
    function onProductChange(index) {
      const productName = document.getElementById('product_' + index).value;
      itemEdits[index].productName = productName;
      if (productName && productPrices[productName] && itemEdits[index].priceSource !== 'ai') {
        itemEdits[index].price = productPrices[productName];
        itemEdits[index].priceSource = 'master';
        document.getElementById('price_' + index).value = productPrices[productName];
      }
      const preview = document.getElementById('learnPreview_' + index);
      if (preview) preview.textContent = '→ ' + (productName || '未選択');
      checkModified(index);
      updateLearnSummary();
    }
    
    function onSpecChange(index) {
      itemEdits[index].spec = document.getElementById('spec_' + index).value;
      checkModified(index);
    }
    
    function onPriceChange(index) {
      itemEdits[index].price = Number(document.getElementById('price_' + index).value) || 0;
      itemEdits[index].priceSource = 'manual';
      checkModified(index);
    }
    
    function onQuantityChange(index) {
      itemEdits[index].quantity = document.getElementById('quantity_' + index).value;
      checkModified(index);
    }
    
    function onUnitChange(index) {
      itemEdits[index].unit = document.getElementById('unit_' + index).value;
      checkModified(index);
    }
    
    /**
     * 学習チェックボックス切り替え
     */
    function toggleLearn(index) {
      const checked = document.getElementById('learn_' + index).checked;
      itemEdits[index].learn = checked;
      const row = document.getElementById('learnRow_' + index);
      const preview = document.getElementById('learnPreview_' + index);
      if (checked) { row.classList.add('will-learn'); preview.style.display = ''; }
      else { row.classList.remove('will-learn'); preview.style.display = 'none'; }
      updateLearnSummary();
    }
    
    /**
     * 変更チェック
     */
    function checkModified(index) {
      const card = document.getElementById('itemCard_' + index);
      const edit = itemEdits[index];
      if (edit.productName !== edit.originalProductName) { card.classList.add('modified'); }
      else { card.classList.remove('modified'); }
    }
    
    /**
     * 学習サマリ更新
     */
    function updateLearnSummary() {
      const summaryDiv = document.getElementById('learnSummary');
      const itemsDiv = document.getElementById('learnSummaryItems');
      const learnList = [];
      Object.keys(itemEdits).forEach(index => {
        const edit = itemEdits[index];
        if (edit.learn && edit.originalText && edit.productName) {
          learnList.push({ originalText: edit.originalText, productName: edit.productName, isModified: edit.productName !== edit.originalProductName });
        }
      });
      if (learnList.length === 0) { summaryDiv.style.display = 'none'; return; }
      summaryDiv.style.display = 'block';
      itemsDiv.innerHTML = learnList.map(l => '<div class="learn-summary-item"><span class="original">「' + l.originalText + '」</span><span class="arrow">→</span><span class="product">' + l.productName + '</span>' + (l.isModified ? '<span class="modified-badge">修正済</span>' : '') + '</div>').join('');
    }
    
    /**
     * データソース選択
     */
    function selectSource(type, source) {
      if (type === 'shippingTo') {
        useShippingToMaster = (source === 'master');
      } else {
        useCustomerMaster = (source === 'master');
      }
      const btns = document.querySelectorAll('#' + type + 'SourceSelect .source-select-btn');
      btns.forEach(btn => {
        btn.classList.remove('selected');
      });
      btns.forEach(btn => {
        const btnText = btn.textContent.trim();
        if ((source === 'raw' && btnText.includes('読み取り')) ||
            (source === 'master' && btnText.includes('マスタ')) ||
            (source === 'manual' && btnText.includes('手動選択'))) {
          btn.classList.add('selected');
        }
      });
      console.log('データソース選択:', type, source);
    }
    
    /**
     * 信頼度バッジ設定
     */
    function setConfidenceBadge(id, conf) {
      const el = document.getElementById(id);
      if (!el) return;
      el.className = 'confidence-badge confidence-' + (conf || 'low');
      el.textContent = getConfidenceLabel(conf);
    }
    
    /**
     * 信頼度ラベル取得
     */
    function getConfidenceLabel(conf) {
      return { high: '✅ 高', medium: '⚠️ 中', low: '❓ 低' }[conf] || '❓';
    }
    
    /**
     * エラー表示
     */
    function showError(msg) {
      document.getElementById('aiResultArea').classList.add('show');
      document.getElementById('aiError').style.display = 'block';
      document.getElementById('aiError').textContent = msg;
    }
    
    /**
     * AI解析結果クリア
     */
    function clearAIResult() {
      aiAnalysisResult = null;
      useShippingToMaster = useCustomerMaster = false;
      itemEdits = {};
      document.getElementById('aiResultArea').classList.remove('show');
      document.getElementById('aiInputText').value = '';
      removeFile();
    }
    
    /**
     * AI解析結果を受注フォームに反映（最重要関数）
     *
     * AI解析結果と商品マッピング学習内容を受注フォームに適用します。
     * これは「フォームに反映」ボタンのメイン処理関数です。
     *
     * 処理フロー:
     * 1. 商品マッピング学習データの記録（learn=trueの商品）
     *    - 発送先名優先でマッピング（発送先名 → 商品名）
     *    - 後方互換のため顧客名も記録
     * 2. 日付情報の反映（発送日、配送希望日）
     * 3. 発送先情報の反映（優先順位: 手動選択 > マスタ > AI読み取り）
     * 4. 顧客情報の反映（優先順位: 手動選択 > マスタ > AI読み取り）
     * 5. 商品情報の反映（最大10行、分類・商品・価格・数量）
     * 6. セッションデータの保存
     * 7. 解析済みインジケーターの表示
     * 8. 成功トーストの表示（学習件数含む）
     * 9. AIアシスタントパネルを閉じる
     *
     * データ適用の優先順位:
     * - 手動選択（検索/新規登録/AI推定）: 最優先
     * - マスタデータ（自動マッチング）: 中優先
     * - AI読み取り（raw値）: 最低優先
     *
     * マッピング学習:
     * - Phase 5実装: 発送先名優先マッピング
     * - 原文テキスト → 商品名 の対応を学習
     * - 次回から同じ原文が自動認識される
     *
     * 顧客名表示形式:
     * - 受注画面では常に「会社名　氏名」形式（displayNameは使用しない）
     *
     * @returns {void}
     * @see registerProductMappingBulk() - サーバーサイド一括学習関数
     * @see saveAISessionData() - セッション保存
     * @see showAIAnalyzedIndicator() - インジケーター表示
     * @see toggleAIAssistant() - パネル閉じる
     */
    function applyAIResult() {
      if (!aiAnalysisResult) { showWarningToast('解析結果がありません'); return; }
      
      // 発送先名を優先的に取得（マッピング学習用）
      const shippingToName = aiAnalysisResult.shippingTo?.masterData?.companyName || 
                             aiAnalysisResult.shippingTo?.rawCompanyName || '';
      const customerName = aiAnalysisResult.customer?.rawCompanyName || '';
      
      const mappingsToLearn = [];
      Object.keys(itemEdits).forEach(index => {
        const edit = itemEdits[index];
        if (edit.learn && edit.originalText && edit.productName) {
          mappingsToLearn.push({ 
            originalText: edit.originalText, 
            productName: edit.productName, 
            shippingToName: shippingToName,  // 発送先名優先
            customerName: customerName,       // 後方互換
            spec: edit.spec || '' 
          });
        }
      });
      
      if (mappingsToLearn.length > 0) {
        google.script.run.withSuccessHandler(function(results) { console.log('マッピング学習結果:', results); }).withFailureHandler(function(error) { console.error('マッピング学習エラー:', error); }).registerProductMappingBulk(mappingsToLearn);
      }
      
      if (aiAnalysisResult.shippingDate) { setFormValue('shippingDate', aiAnalysisResult.shippingDate); }
      if (aiAnalysisResult.deliveryDate) { setFormValue('deliveryDate', aiAnalysisResult.deliveryDate); }

      // 発送先の適用（優先順位: 手動選択 > マスタ > AI読み取り）
      if (manualShippingToSelection) {
        console.log('手動選択した発送先データを適用:', manualShippingToSelection);
        const name = [manualShippingToSelection.companyName, manualShippingToSelection.personName].filter(Boolean).join('　');
        setFormValue('shippingToName', name);
        setFormValue('shippingToZipcode', manualShippingToSelection.zipcode || '');
        setFormValue('shippingToAddress', manualShippingToSelection.address || '');
        setFormValue('shippingToTel', manualShippingToSelection.tel || '');
      } else {
        const st = aiAnalysisResult.shippingTo;
        if (st) {
          const data = useShippingToMaster && st.masterData ? st.masterData : st;
          setFormValue('shippingToName', useShippingToMaster ? [data.companyName, data.personName].filter(Boolean).join('　') : [st.rawCompanyName, st.rawPersonName].filter(Boolean).join('　'));
          setFormValue('shippingToZipcode', (useShippingToMaster ? data.zipcode : st.rawZipcode) || '');
          setFormValue('shippingToAddress', (useShippingToMaster ? data.address : st.rawAddress) || '');
          setFormValue('shippingToTel', (useShippingToMaster ? data.tel : st.rawTel) || '');
        }
      }

      // 顧客の適用（優先順位: 手動選択 > マスタ > AI読み取り）
      if (manualCustomerSelection) {
        console.log('手動選択した顧客データを適用:', manualCustomerSelection);
        // 受注画面では常に「会社名 氏名」形式で表示（displayNameは使わない）
        const name = [manualCustomerSelection.companyName, manualCustomerSelection.personName]
          .filter(Boolean).join('　');
        setFormValue('customerName', name);
        setFormValue('customerZipcode', manualCustomerSelection.zipcode || '');
        setFormValue('customerAddress', manualCustomerSelection.address || '');
        setFormValue('customerTel', manualCustomerSelection.tel || '');
      } else {
        const cust = aiAnalysisResult.customer;
        if (cust) {
          const data = useCustomerMaster && cust.masterData ? cust.masterData : cust;
          setFormValue('customerName', useCustomerMaster ? (data.displayName || [data.companyName, data.personName].filter(Boolean).join('　')) : [cust.rawCompanyName, cust.rawPersonName].filter(Boolean).join('　'));
          setFormValue('customerZipcode', (useCustomerMaster ? data.zipcode : cust.rawZipcode) || '');
          setFormValue('customerAddress', (useCustomerMaster ? data.address : cust.rawAddress) || '');
          setFormValue('customerTel', (useCustomerMaster ? data.tel : cust.rawTel) || '');
        }
      }
      
      Object.keys(itemEdits).forEach((index, i) => {
        const row = i + 1;
        if (row > 10) return;
        const edit = itemEdits[index];
        if (edit.category) {
          const bunrui = document.getElementById('bunrui' + row);
          if (bunrui) { bunrui.value = edit.category; if (typeof bunruiChange === 'function') bunruiChange(row); }
        }
        if (edit.productName) {
          setTimeout(() => {
            const prod = document.getElementById('product' + row);
            if (prod) {
              for (let j = 0; j < prod.options.length; j++) {
                if (prod.options[j].value === edit.productName) {
                  prod.selectedIndex = j;
                  if (typeof productChange === 'function') productChange(row);
                  break;
                }
              }
            }
          }, 100 * i);
        }
        if (edit.price) {
          setTimeout(() => {
            const priceEl = document.getElementById('price' + row);
            if (priceEl) priceEl.value = edit.price;
          }, 100 * i + 30);
        }
        if (edit.quantity) {
          setTimeout(() => {
            const qty = document.getElementById('quantity' + row);
            if (qty) qty.value = edit.quantity;
          }, 100 * i + 50);
        }
      });
      
      saveAISessionData();
      showAIAnalyzedIndicator(new Date().toISOString());
      
      let message = 'フォームに反映しました。';
      if (mappingsToLearn.length > 0) { message += '\n\n📚 ' + mappingsToLearn.length + '件のマッピングを学習しました。'; }
      if (aiAnalysisResult.alerts?.length) { message += '\n\n⚠️ ' + aiAnalysisResult.alerts.join('\n'); }
      showInfoToast(message);
      toggleAIAssistant();
    }
    
    /**
     * フォーム値設定ユーティリティ
     */
    function setFormValue(id, value) {
      const el = document.getElementById(id);
      if (el) el.value = value;
    }
</script>
