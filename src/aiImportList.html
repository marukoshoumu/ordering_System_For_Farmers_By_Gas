<!-- 
  AI取込一覧 - 仮受注管理画面
  
  機能:
  - LINE Bot経由で取り込まれた仮受注データを一覧表示
  - ステータス：未処理 / 却下
  - 「受注処理へ」で受注画面へ遷移 → 受注完了で仮受注データ削除
  - 「却下」でステータス更新
  - 却下データ：削除 or 再登録
  - 未処理件数バッジ表示
-->

<!DOCTYPE html>
<html lang="ja">

<head>
  <?!= HtmlService.createHtmlOutputFromFile('utilities').getContent(); ?>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI取込一覧</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      background-color: var(--bg-body);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    .main-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 16px;
    }

    .card {
      border: none;
      border-radius: var(--radius-md);
      box-shadow: var(--shadow);
    }

    .page-hero-header {
      background: #4a90a4;
      /* 統一カラーに変更 */
      color: white;
      border-radius: var(--radius-md) var(--radius-md) 0 0 !important;
      padding: var(--space-4) var(--space-5);
    }

    .card-header h1 {
      font-size: 1.25rem;
      margin: 0;
      font-weight: 600;
    }

    /* 未処理件数バッジ */
    .pending-badge {
      background: var(--status-error);
      color: white;
      padding: var(--space-1) var(--space-3);
      border-radius: var(--radius-full);
      font-size: 0.875rem;
      font-weight: 600;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.7;
      }
    }

    /* サマリーセクション */
    .summary-section {
      padding: 20px;
      background: #fff;
      border-bottom: 1px solid #e9ecef;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .summary-cards {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .summary-card {
      flex: 1;
      min-width: 120px;
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-md);
      text-align: center;
      transition: transform 0.2s;
    }

    .summary-card:hover {
      transform: translateY(-2px);
    }

    .summary-card.pending {
      background: linear-gradient(135deg, #fff9db 0%, #fff3cd 100%);
      border: 1px solid #ffe066;
    }

    .summary-card.rejected {
      background: linear-gradient(135deg, #fff5f5 0%, #ffe3e3 100%);
      border: 1px solid #ffc9c9;
    }

    .summary-card .count {
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--gray-800);
    }

    .summary-card .label {
      font-size: 0.75rem;
      color: var(--gray-600);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* 処理進捗バー */
    .overall-progress-container {
      background: var(--gray-100);
      border-radius: var(--radius-full);
      height: 8px;
      overflow: hidden;
      margin-top: 8px;
    }

    .overall-progress-bar {
      height: 100%;
      background: var(--gradient-purple);
      width: 0%;
      transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* フィルターセクション */
    .filter-section {
      padding: 12px 20px;
      background: #fff;
      border-bottom: 1px solid #e9ecef;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    /* カード形式の一覧 - .card-unifiedを使用 */
    .card-unified {
      margin-bottom: 20px;
      position: relative;
      background: white;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-color);
      box-shadow: var(--shadow);
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      overflow: hidden;
      animation: cardIn 0.5s ease-out forwards;
      opacity: 0;
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card-unified:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
      border-color: var(--brand-purple);
    }

    .card-unified.pending {
      border-left: 6px solid var(--brand-purple);
    }

    .card-unified.processed {
      border-left: 6px solid var(--status-success);
      opacity: 0.7;
    }

    .card-unified.rejected {
      border-left: 6px solid var(--status-error);
      opacity: 0.5;
    }

    .card-unified-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 16px 20px 12px;
      background: linear-gradient(to bottom, #fafafa 0%, #ffffff 100%);
    }

    /* 信頼度/完遂度プログレス */
    .completeness-container {
      margin: 0 20px 16px;
    }

    .completeness-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--gray-600);
    }

    .completeness-bar-bg {
      height: 6px;
      background: var(--gray-100);
      border-radius: var(--radius-full);
      overflow: hidden;
    }

    .completeness-bar-fill {
      height: 100%;
      background: var(--brand-purple);
      width: 0%;
      transition: width 0.8s ease-out;
    }

    .import-card-id {
      font-size: 0.7rem;
      color: #999;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: -0.02em;
    }

    .import-card-time {
      font-size: 0.85rem;
      color: var(--gray-600);
      font-weight: 500;
    }

    .import-card-status {
      padding: 4px 12px;
      border-radius: var(--radius-full);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .status-pending {
      background: var(--status-warning-light);
      color: #856404;
      border: 1px solid #ffeeba;
    }

    .status-processed {
      background: var(--status-success-light);
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .status-rejected {
      background: var(--status-error-light);
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .import-card-body {
      padding: 0 20px 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    @media (max-width: 576px) {
      .import-card-body {
        grid-template-columns: 1fr;
      }
    }

    .import-card-info {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px;
      background: var(--gray-50);
      border-radius: var(--radius);
      border: 1px solid transparent;
      transition: all 0.2s;
    }

    .card-unified:hover .import-card-info {
      background: #fafbff;
      border-color: #eef2ff;
    }

    .import-card-icon {

      font-size: 1.1rem;
      margin-top: 2px;

    .import-card-label {
      font-size: 0.7rem;
      color: var(--gray-500);
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .import-card-value {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--gray-800);
      word-break: break-word;
    }

    /* 商品リスト */
    .import-card-items {
      grid-column: 1 / -1;
      background: #f8fafc;
      border: 1px solid #f1f5f9;
      border-radius: var(--radius-md);
      padding: 14px 16px;
    }

    .import-card-items-header {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--gray-700);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .import-card-item {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      padding: 6px 0;
      border-bottom: 1px solid rgba(0, 0, 0, 0.03);
    }

    .import-card-item:last-child {
      border-bottom: none;
    }

    .import-card-item-name {
      color: var(--gray-800);

    }

    .import-card-item-qty {
      color: var(--brand-purple);

      border-radius: 6px;

      box-shadow: var(--shadow-sm);

    /* 信頼度バッジ */
    .confidence-badge {
      padding: 4px 10px;
      border-radius: var(--radius-sm);
      font-size: 0.7rem;
      font-weight: 700;
    }

    /* アクションボタン */
    .import-card-actions {
      display: flex;
      gap: 12px;

      background: #fafafa;
      border-top: 1px solid #f0f0f0;
    }

    .btn-process {
      flex: 2;
      background: var(--gradient-purple);
      border: none;
      color: white;
      padding: 12px var(--space-4);
      border-radius: var(--radius-md);
      font-weight: 700;
      transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(122, 109, 181, 0.3);
    }

    .btn-process:hover {
      transform: translateY(-2px);

    }

    .btn-reject {
      flex: 1;
      background: white;
      border: 2px solid #ffc9c9;
      color: #fa5252;
      padding: 12px var(--space-4);
      border-radius: var(--radius-md);
      font-weight: 700;
      transition: all 0.2s;
    }

    .btn-reject:hover {
      background: #fff5f5;
      border-color: #fa5252;
    }

    /* 空状態 */
    .empty-state {
      padding: 60px 20px;

      color: #666;
    }

    .empty-state i {
      font-size: 4rem;

    }

    .empty-state h3 {
      font-size: 1.25rem;

    .empty-state p {
      font-size: 0.9rem;

    /* 確認モーダル */
    .modal-header.reject-header {

      color: white;

    /* 詳細モーダル */

    }

    .detail-value {

    .original-text {

      padding: var(--space-3);

    /* レスポンシブ */
    @media (max-width: 576px) {

  </style>
</head>

  <div class="main-container">
    <div class="card overflow-hidden">

  <!-- 受注画面遷移用フォーム -->
  <form id="processForm" method="POST" action="<?= deployURL ?>" style="display: none;">
    <input type="hidden" name="sessionId" value="<?= typeof sessionId !== 'undefined' ? sessionId : '' ?>">
    <input type="hidden" name="shipping" value="true">

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // グローバル変数
    let importData = [];
    let currentRejectId = null;
    let currentDetailData = null;

    // 初期化
    document.addEventListener('DOMContentLoaded', function () {
      setupEventListeners();
      loadImportData();
    });

    // イベントリスナー設定
    function setupEventListeners() {
      // フィルター変更
      document.querySelectorAll('input[name="statusFilter"]').forEach(radio => {
        radio.addEventListener('change', renderImportList);
      });

      // 却下確認ボタン
      document.getElementById('confirmRejectBtn').addEventListener('click', function () {
        if (currentRejectId) {
          rejectImport(currentRejectId);
        }
      });
    }

    // データ読み込み
    function loadImportData() {
      showLoading('データ読み込み中...');
      document.getElementById('emptyState').style.display = 'none';

      google.script.run
        .withSuccessHandler(function (result) {
          hideLoading();
          try {
            importData = JSON.parse(result) || [];
            updateSummary();
            renderImportList();
          } catch (e) {
            console.error('パースエラー:', e);
            importData = [];
            renderImportList();
          }
        })
        .withFailureHandler(function (error) {
          hideLoading();
          showErrorToast('データ取得エラー: ' + error.message);
        })
        .getAIImportList();
    }

    // サマリー更新
    function updateSummary() {
      const total = importData.length;
      const pending = importData.filter(d => d.status === '未処理').length;
      const rejected = importData.filter(d => d.status === '却下').length;
      const processed = importData.filter(d => d.status === '処理済み').length;

      document.getElementById('pendingCount').textContent = pending;
      document.getElementById('rejectedCount').textContent = rejected;

      const badge = document.getElementById('pendingBadge');
      badge.textContent = '未処理: ' + pending + '件';
      badge.style.display = pending > 0 ? 'inline-block' : 'none';

      // 全体進捗バー更新
      const progress = total > 0 ? Math.round((processed / total) * 100) : 0;
      const progBar = document.getElementById('overallProgressBar');
      const progText = document.getElementById('overallProgressText');

      if (progBar) progBar.style.width = progress + '%';
      if (progText) progText.textContent = progress + '%';
    }

    // 完遂度スコア計算
    function calculateCompleteness(item) {
      let score = 0;

      // 1. 顧客名 (30%)
      if (item.customerName && item.customerName !== '不明') score += 30;

      // 2. 発送先 (20%)
      if (item.shippingTo) score += 20;

      // 3. 商品マッピング (50%)
      const items = item.items || [];
      if (items.length > 0) {
        const mappedCount = items.filter(i => i.productName && i.productName !== i.originalText).length;
        score += Math.round((mappedCount / items.length) * 50);
      } else {
        score += 50;
      }

      return Math.min(score, 100);
    }

    // 一覧描画
    function renderImportList() {
      const container = document.getElementById('importListContainer');
      const filterInput = document.querySelector('input[name="statusFilter"]:checked');
      const filter = filterInput ? filterInput.value : 'pending';

      let filteredData = importData;
      if (filter === 'pending') {
        filteredData = importData.filter(d => d.status === '未処理');
      }

      if (filteredData.length === 0) {
        container.innerHTML = '';
        document.getElementById('emptyState').style.display = 'block';
        return;
      }

      document.getElementById('emptyState').style.display = 'none';

      container.innerHTML = filteredData.map((item, index) => {
        const statusClass = item.status === '未処理' ? 'pending' :
          item.status === '処理済み' ? 'processed' : 'rejected';
        const statusBadgeClass = item.status === '未処理' ? 'status-pending' :
          item.status === '処理済み' ? 'status-processed' : 'status-rejected';

        const confidenceClass = item.confidence === '高' ? 'confidence-high' :
          item.confidence === '中' ? 'confidence-medium' : 'confidence-low';
        const confidenceText = item.confidence === '高' ? '✅ 高' :
          item.confidence === '中' ? '⚠️ 中' : '❓ 低';

        const completeness = calculateCompleteness(item);
        const completenessColor = completeness >= 80 ? 'var(--status-success)' :
          completeness >= 50 ? 'var(--brand-purple)' : 'var(--status-warning)';

        // 商品リスト（最大3件表示）
        const items = item.items || [];
        const displayItems = items.slice(0, 3);
        const moreCount = items.length - 3;

        // カードの表示遅延（アニメーション用）
        const delay = index * 0.1;

        return `
          <div class="card-unified ${statusClass}" style="animation-delay: ${delay}s" onclick="showDetail('${escapeHtml(item.tempOrderId)}')">
            <div class="card-unified-header">
              <div>
                <div class="import-card-id">#${escapeHtml(item.tempOrderId)}</div>
                <div class="import-card-time">
                  <i class="bi bi-clock-history me-1"></i>${formatDateTime(item.createdAt)}
                </div>
              </div>
              <div class="d-flex align-items-center gap-2">
                <span class="confidence-badge ${confidenceClass}">${confidenceText} 信頼度</span>
                <span class="import-card-status ${statusBadgeClass}">${item.status}</span>
              </div>
            </div>

            <!-- 完遂度バー -->
            <div class="completeness-container">
              <div class="completeness-header">
                <span>データ完遂度</span>
                <span>${completeness}%</span>
              </div>
              <div class="completeness-bar-bg">
                <div class="completeness-bar-fill" id="bar-${item.tempOrderId}" style="width: 0%; background-color: ${completenessColor}"></div>
              </div>
            </div>

            <div class="import-card-body">
              <div class="import-card-info">
                <i class="bi bi-person-badge import-card-icon"></i>
                <div>
                  <div class="import-card-label">顧客名</div>
                  <div class="import-card-value">${escapeHtml(item.customerName) || '不明'}</div>
                </div>
              </div>
              <div class="import-card-info">
                <i class="bi bi-truck import-card-icon"></i>
                <div>
                  <div class="import-card-label">発送先</div>
                  <div class="import-card-value">${escapeHtml(item.shippingTo) || '同上 (マスタ参照)'}</div>
                </div>
              </div>

              <div class="import-card-items">
                <div class="import-card-items-header">
                  <i class="bi bi-list-check"></i>注文内容（${items.length}点）
                </div>
                ${displayItems.map(i => `
                  <div class="import-card-item">
                    <span class="import-card-item-name">${escapeHtml(i.productName || i.originalText)}</span>
                    <span class="import-card-item-qty">${i.quantity || ''}${i.unit || ''}</span>
                  </div>
                `).join('')}
                ${moreCount > 0 ? `<div class="import-card-item text-muted small px-2">他${moreCount}点の商品があります...</div>` : ''}
              </div>
            </div>

            ${item.status === '未処理' ? `
              <div class="import-card-actions" onclick="event.stopPropagation();">
                <button type="button" class="btn btn-process" onclick="processImport('${escapeHtml(item.tempOrderId)}')">
                  <i class="bi bi-arrow-right-circle me-1"></i>受注処理を開始する
                </button>
                <button type="button" class="btn btn-reject" onclick="showRejectModal('${escapeHtml(item.tempOrderId)}', '${escapeHtml(item.customerName)}', '${escapeHtml(getItemsSummary(items))}')">
                  <i class="bi bi-x-circle me-1"></i>却下
                </button>
              </div>
            ` : ''}
            ${item.status === '却下' ? `
              <div class="import-card-actions" onclick="event.stopPropagation();">
                <button type="button" class="btn btn-secondary btn-sm" onclick="reactivateImport('${escapeHtml(item.tempOrderId)}')">
                  <i class="bi bi-arrow-counterclockwise me-1"></i>再登録
                </button>
                <button type="button" class="btn btn-outline-danger btn-sm" onclick="deleteImport('${escapeHtml(item.tempOrderId)}')">
                  <i class="bi bi-trash me-1"></i>完全削除
                </button>
              </div>
            ` : ''}
          </div>
        `;
      }).join('');

      // アニメーション後に完遂度バーを伸ばす
      setTimeout(() => {
        filteredData.forEach(item => {
          const bar = document.getElementById(`bar-${item.tempOrderId}`);
          if (bar) {
            const comp = calculateCompleteness(item);
            bar.style.width = comp + '%';
          }
        });
      }, 100);
    }

    // 日時フォーマット
    function formatDateTime(dateStr) {
      if (!dateStr) return '-';
      const d = new Date(dateStr);
      if (isNaN(d.getTime())) return '-';
      return (d.getMonth() + 1) + '月' + d.getDate() + '日 ' +
        String(d.getHours()).padStart(2, '0') + ':' +
        String(d.getMinutes()).padStart(2, '0');
    }

    // 商品サマリー取得
    function getItemsSummary(items) {
      if (!items || items.length === 0) return 'なし';
      const first = items[0].productName || items[0].originalText || '';
      if (items.length === 1) return first;
      return first + ' 他' + (items.length - 1) + '点';
    }

    // HTMLエスケープ
    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    // 受注処理へ遷移
    function processImport(tempOrderId) {
      document.getElementById('tempOrderIdInput').value = tempOrderId;
      document.getElementById('processForm').submit();
    }

    // 却下モーダル表示
    function showRejectModal(tempOrderId, customerName, itemsSummary) {
      currentRejectId = tempOrderId;
      document.getElementById('rejectCustomerName').textContent = customerName || '不明';
      document.getElementById('rejectItemsSummary').textContent = itemsSummary || 'なし';
      new bootstrap.Modal(document.getElementById('rejectModal')).show();
    }

    // 却下処理
    function rejectImport(tempOrderId) {
      bootstrap.Modal.getInstance(document.getElementById('rejectModal')).hide();

      google.script.run
        .withSuccessHandler(function (result) {
          if (result.success) {
            // ローカルデータ更新
            const item = importData.find(d => d.tempOrderId === tempOrderId);
            if (item) {
              item.status = '却下';
            }
            updateSummary();
            renderImportList();
          } else {
            showErrorToast('却下に失敗しました: ' + (result.error || ''));
          }
        })
        .withFailureHandler(function (error) {
          showErrorToast('エラー: ' + error.message);
        })
        .rejectTempOrder(tempOrderId);
    }

    // 仮受注データを完全削除
    async function deleteImport(tempOrderId) {
      if (!(await showConfirmDialog('この仮受注データを完全に削除しますか？\n削除後は復元できません。'))) {
        return;
      }

      google.script.run
        .withSuccessHandler(function (result) {
          if (result.success) {
            // ローカルデータから削除
            const index = importData.findIndex(d => d.tempOrderId === tempOrderId);
            if (index !== -1) {
              importData.splice(index, 1);
            }
            updateSummary();
            renderImportList();
            showSuccessToast('削除しました');
          } else {
            showErrorToast('削除に失敗しました: ' + (result.error || ''));
          }
        })
        .withFailureHandler(function (error) {
          showErrorToast('エラー: ' + error.message);
        })
        .deleteTempOrderData(tempOrderId);
    }

    // 却下データを再登録（ステータスを「未処理」に戻す）
    async function reactivateImport(tempOrderId) {
      if (!(await showConfirmDialog('この仮受注を再登録しますか？\nステータスが「未処理」に戻ります。'))) {
        return;
      }

      google.script.run
        .withSuccessHandler(function (result) {
          if (result.success) {
            // ローカルデータ更新
            const item = importData.find(d => d.tempOrderId === tempOrderId);
            if (item) {
              item.status = '未処理';
            }
            updateSummary();
            renderImportList();
            showSuccessToast('再登録しました');
          } else {
            showErrorToast('再登録に失敗しました: ' + (result.error || ''));
          }
        })
        .withFailureHandler(function (error) {
          showErrorToast('エラー: ' + error.message);
        })
        .reactivateTempOrder(tempOrderId);
    }

    // 詳細モーダル表示
    function showDetail(tempOrderId) {
      const item = importData.find(d => d.tempOrderId === tempOrderId);
      if (!item) return;

      currentDetailData = item;
      const body = document.getElementById('detailModalBody');

      const items = item.items || [];

      body.innerHTML = `
      <div class="row">
        <div class="col-md-6">
          <div class="detail-section">
            <div class="detail-label">取込ID</div>
            <div class="detail-value">${escapeHtml(item.tempOrderId)}</div>
          </div>
          <div class="detail-section">
            <div class="detail-label">取込日時</div>
            <div class="detail-value">${formatDateTime(item.createdAt)}</div>
          </div>
          <div class="detail-section">
            <div class="detail-label">ステータス</div>
            <div class="detail-value">
              <span class="import-card-status ${item.status === '未処理' ? 'status-pending' : 'status-rejected'}">${item.status}</span>
            </div>
          </div>
        </div>
        <div class="col-md-6">
          <div class="detail-section">
            <div class="detail-label">顧客名</div>
            <div class="detail-value">${escapeHtml(item.customerName) || '不明'}</div>
          </div>
          <div class="detail-section">
            <div class="detail-label">発送先</div>
            <div class="detail-value">${escapeHtml(item.shippingTo) || '同上'}</div>
          </div>
          <div class="detail-section">
            <div class="detail-label">解析信頼度</div>
            <div class="detail-value">
              <span class="confidence-badge ${item.confidence === '高' ? 'confidence-high' : item.confidence === '中' ? 'confidence-medium' : 'confidence-low'}">
                ${item.confidence === '高' ? '✅ 高' : item.confidence === '中' ? '⚠️ 中' : '❓ 低'}
              </span>
            </div>
          </div>
        </div>
      </div>

      <div class="detail-section">
        <div class="detail-label">商品（${items.length}点）</div>
        <div class="import-card-items" style="margin-top: 8px;">
          ${items.map(i => `
            <div class="import-card-item">
              <span class="import-card-item-name">${escapeHtml(i.productName || i.originalText)}</span>
              <span class="import-card-item-qty">${i.quantity || ''}${i.unit || ''}</span>
            </div>
          `).join('')}
        </div>
      </div>

      <div class="detail-section">
        <div class="detail-label">原文テキスト</div>
        <div class="original-text">${escapeHtml(item.originalText) || '(なし)'}</div>
      </div>
    `;

      // ボタンの表示/非表示
      const rejectBtn = document.getElementById('detailRejectBtn');
      const processBtn = document.getElementById('detailProcessBtn');

      if (item.status === '未処理') {
        rejectBtn.style.display = '';
        processBtn.style.display = '';
        processBtn.onclick = () => {
          bootstrap.Modal.getInstance(document.getElementById('detailModal')).hide();
          processImport(item.tempOrderId);
        };
        rejectBtn.onclick = () => {
          bootstrap.Modal.getInstance(document.getElementById('detailModal')).hide();
          showRejectModal(item.tempOrderId, item.customerName, getItemsSummary(items));
        };
      } else {
        rejectBtn.style.display = 'none';
        processBtn.style.display = 'none';
      }

      new bootstrap.Modal(document.getElementById('detailModal')).show();
    }
  </script>

</body>

</html>
