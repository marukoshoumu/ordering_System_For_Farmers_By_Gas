            </div>
            <script>
              /**
               * 定期発送の次回発送日を更新
               * (calcNextRecurringDateはutilities.htmlで定義)
               */
              function updateRecurringNextDate() {
                var shippingDateInput = document.querySelector('input[name="shippingDate1"]');
                if (!shippingDateInput || !shippingDateInput.value) return;
                var baseDate = new Date(shippingDateInput.value);
                var type = document.getElementById('recurringType').value;
                var subValue = null;
                if (type.endsWith('weekly') || type.endsWith('week')) {
                  var weekdaySelect = document.getElementById('recurringWeekday');
                  if (weekdaySelect) subValue = weekdaySelect.value;
                } else if (type === 'monthly') {
                  var monthDaySelect = document.getElementById('recurringMonthDay');
                  if (monthDaySelect) subValue = monthDaySelect.value;
                }
                var nextDate = calcNextRecurringDate(baseDate, type, subValue);
                if (nextDate) {
                  var year = nextDate.getFullYear();
                  var month = String(nextDate.getMonth() + 1).padStart(2, '0');
                  var day = String(nextDate.getDate()).padStart(2, '0');
                  document.getElementById('recurringNextDate').value = year + '-' + month + '-' + day;
                }
              }

              function onRecurringTypeChange() {
                var type = document.getElementById('recurringType').value;
                var subOptions = document.getElementById('recurringSubOptions');
                subOptions.innerHTML = '';
                if (type.endsWith('weekly') || type.endsWith('week')) {
                  // 曜日セレクト（weekly / biweekly / triweekly / 4week など）
                  var days = ['月', '火', '水', '木', '金', '土', '日'];
                  var select = document.createElement('select');
                  select.className = 'form-select';
                  select.id = 'recurringWeekday';
                  select.name = 'recurringWeekday';
                  days.forEach(function (day, idx) {
                    var opt = document.createElement('option');
                    opt.value = idx + 1;
                    opt.text = '毎週' + day + '曜日';
                    select.appendChild(opt);
                  });
                  select.onchange = updateRecurringNextDate;
                  subOptions.appendChild(select);
                } else if (type === 'monthly') {
                  // 日付セレクト
                  var select = document.createElement('select');
                  select.className = 'form-select';
                  select.id = 'recurringMonthDay';
                  select.name = 'recurringMonthDay';
                  for (var i = 1; i <= 31; i++) {
                    var opt = document.createElement('option');
                    opt.value = i;
                    opt.text = '毎月' + i + '日';
                    select.appendChild(opt);
                  }
                  var optFirst = document.createElement('option');
                  optFirst.value = 'first';
                  optFirst.text = '毎月初日';
                  select.appendChild(optFirst);
                  var optLast = document.createElement('option');
                  optLast.value = 'last';
                  optLast.text = '毎月末日';
                  select.appendChild(optLast);
                  select.onchange = updateRecurringNextDate;
                  subOptions.appendChild(select);
                }
                // 次回発送日入力欄を表示
                document.getElementById('recurringNextDateRow').style.display = '';
                // 定期タイプ変更時に次回発送日を自動計算（shippingDate1が存在し値がある場合のみ）
                var shippingDateInput = document.querySelector('input[name="shippingDate1"]');
                if (shippingDateInput && shippingDateInput.value) {
                  updateRecurringNextDate();
                }
              }
              // 初期化
              document.addEventListener('DOMContentLoaded', function () {
                var shippingDateInput = document.querySelector('input[name="shippingDate1"]');
                // 発送日変更時に次回発送日を自動計算
                if (shippingDateInput) {
                  shippingDateInput.addEventListener('change', updateRecurringNextDate);
                }
                // shippingDate1が存在し、値がある場合のみonRecurringTypeChangeを呼び出す
                if (document.getElementById('recurringType') && shippingDateInput && shippingDateInput.value) {
                  onRecurringTypeChange();
                }
              });
            </script>
          </div>
        </div>
      </div>
      <? } ?>

      <!-- ボタンエリア（白背景で独立） -->
      <div class="form-actions-area">
        <div class="text-center">
          <? if (isEditMode) { ?>
          <button type="submit" class="btn btn-warning" name="shippingComfirm" value="true"
            onclick="return validateBeforeSubmit()">修正確認</button>
          <? } else { ?>
          <button type="submit" class="btn btn-primary" name="shippingComfirm" value="true"
            onclick="return validateBeforeSubmit()">受注確認</button>
          <? } ?>
        </div>

      </div>
    </form>
  </div>
  <script>
    // ========================================
    // 検索パフォーマンス改善: マスタデータキャッシュ
    // ========================================
    // NOTE: cachedCustomers, cachedShippingTos, masterDataLoaded は
    // shippingSearchScript.html で宣言されているため、ここでは宣言しない

    var oriproduct = $('select[id="product1"]').html();
    var oriquantity = $('select[id="quantity1"]').html();

    /**
     * 分類（カテゴリ）変更時に商品ドロップダウンをフィルタリング
     *
     * 商品分類が選択されると、その分類に属する商品のみを表示します。
     * 元のoripro duct HTMLを復元してから、選択された分類以外のオプションを削除します。
     *
     * 処理フロー:
     * 1. 商品ドロップダウンをoriproductで初期化
     * 2. 各オプションのdata-val属性と選択された分類を比較
     * 3. 一致しないオプションを削除（最初の空オプションは保持）
     *
     * @param {number} numVal - 商品行番号（1-10）
     * @returns {void}
     * @see productChange() - 商品選択時の処理
     */
    function bunruiChange(numVal) {
      var bunrui = 'bunrui' + numVal;
      var product = 'product' + numVal;
      var $product = $('select[id="' + product + '"]');
      var val1 = $('select[id="' + bunrui + '"]').val();
      $product.html(oriproduct).find('option').each(function () {
        var val2 = $(this).data('val');
        if (val1 && val1 != val2) {
          $(this).not(':first-child').remove();
        }
      })
    }
    /**
     * 商品選択時に価格と数量を自動設定
     *
     * 商品が選択されると、マスタデータから価格と在庫数を取得して自動反映します。
     * 数量ドロップダウンは在庫数に応じてフィルタリングされます。
     *
     * 処理内容:
     * 1. 選択商品のdata属性から在庫数・価格・略称を取得
     * 2. 価格フィールドに自動入力
     * 3. 数量ドロップダウンを在庫数でフィルタリング
     * 4. 1行目の場合は発送品名に略称を設定
     *
     * データ属性:
     * - data-zaiko: 在庫数
     * - data-price: 単価
     * - data-abbreviation: 略称（発送品名用）
     *
     * @param {number} numVal - 商品行番号（1-10）
     * @returns {void}
     * @see bunruiChange() - 分類変更時の処理
     */
    function productChange(numVal) {
      var product = 'product' + numVal;
      var quantity = 'quantity' + numVal;
      var price = 'price' + numVal;
      var $quantity = $('select[id="' + quantity + '"]');
      var $price = $('input[id="' + price + '"]');
      var productVal = $('select[id="' + product + '"]').val();
      var val1 = Number($('[data-name="' + productVal + '"]').data('zaiko'));
      var val2 = Number($('[data-name="' + productVal + '"]').data('price'));
      var val3 = $('[data-name="' + productVal + '"]').data('abbreviation');
      $price.val(val2);
      $quantity.html(oriquantity).find('option').each(function (index) {
        if (val1 < index) {
          $(this).not(':first-child').remove();
        }
      })
      if (numVal == 1) {
        $('#sendProduct').val(val3);
      }
    }

    /**
     * 商品行のデータをクリアする
     *
     * @param {number} rowNum - 商品行番号（1-10）
     * @returns {void}
     */
    function clearProductRow(rowNum) {
      var bunrui = 'bunrui' + rowNum;
      var product = 'product' + rowNum;
      var price = 'price' + rowNum;
      var quantity = 'quantity' + rowNum;

      // 各フィールドをクリア
      $('select[id="' + bunrui + '"]').val('');
      $('select[id="' + product + '"]').val('');
      $('input[id="' + price + '"]').val('');
      $('input[id="' + quantity + '"]').val('');

      // 1行目の場合、発送品名もクリア
      if (rowNum == 1) {
        $('#sendProduct').val('');
      }
    }

    /**
     * 定期便オプションの表示切替
     *
     * 「定期便として登録する」チェックボックスの状態に応じて、
     * 更新間隔の選択オプションを表示/非表示にします。
     *
     * @returns {void}
     */
    function toggleRecurringOptions() {
      var isChecked = $('#isRecurringOrder').is(':checked');
      if (isChecked) {
        $('#recurringOptions').slideDown(200);
      } else {
        $('#recurringOptions').slideUp(200);
      }
    }

    // 納品方法変更時に復元するための元HTML（DOM準備後に取得するため変数のみ宣言）
    var orideliveryTime, oriinvoiceType, oricoolCls, oricargo1, oricargo2, oricargo3;
    /** 納品方法が一致するか。完全一致のみ（「ヤマト」と「ヤマト伝票受領」は区別する） */
    function deliveryMethodMatches(val1, val2) {
      if (!val1 || !val2) return true;
      return val1 === val2;
    }
    function deliveryMethodChange() {
      var $deliveryMethod = $('select[id="deliveryMethod"]');
      var $deliveryTime = $('select[id="deliveryTime"]');
      var $invoiceType = $('select[id="invoiceType"]');
      var $coolCls = $('select[id="coolCls"]');
      var $cargo1 = $('select[id="cargo1"]');
      var $cargo2 = $('select[id="cargo2"]');
      var $cargo3 = $('select[id="cargo3"]');
      var val1 = $deliveryMethod.val();
      // コピー/編集で渡された値を保持（フィルタ・自動設定後に復元するため）
      var savedDeliveryTime = $deliveryTime.val();
      var savedInvoiceType = $invoiceType.val();
      var savedCoolCls = $coolCls.val();
      var savedCargo1 = $cargo1.val();
      var savedCargo2 = $cargo2.val();
      var savedCargo3 = $cargo3.val();

      // data-val は .attr() で取得（.html(ori*) 直後の要素では .data() が未キャッシュのため属性を確実に参照）
      if (orideliveryTime) {
        $deliveryTime.html(orideliveryTime).find('option').each(function () {
          var val2 = $(this).attr('data-val');
          if (!deliveryMethodMatches(val1, val2)) {
            $(this).not(':first-child').remove();
          }
        });
      }
      if (oriinvoiceType) {
        $invoiceType.html(oriinvoiceType).find('option').each(function () {
          var val2 = $(this).attr('data-val');
          if (!deliveryMethodMatches(val1, val2)) {
            $(this).remove();
          }
        });
      }
      if (oricoolCls) {
        $coolCls.html(oricoolCls).find('option').each(function () {
          var val2 = $(this).attr('data-val');
          if (!deliveryMethodMatches(val1, val2)) {
            $(this).remove();
          }
        });
      }
      if (oricargo1) {
        $cargo1.html(oricargo1).find('option').each(function () {
          var val2 = $(this).attr('data-val');
          if (!deliveryMethodMatches(val1, val2)) {
            $(this).not(':first-child').remove();
          }
        });
      }
      if (oricargo2) {
        $cargo2.html(oricargo2).find('option').each(function () {
          var val2 = $(this).attr('data-val');
          if (!deliveryMethodMatches(val1, val2)) {
            $(this).not(':first-child').remove();
          }
        });
      }
      if (oricargo3) {
        $cargo3.html(oricargo3).find('option').each(function () {
          var val2 = $(this).attr('data-val');
          if (!deliveryMethodMatches(val1, val2)) {
            $(this).not(':first-child').remove();
          }
        });
      }

      // 佐川の場合、荷扱い３を表示
      if (val1 && val1.includes('佐川')) {
        $('#cargo3Container').show();
        // 荷扱い１に「指定日配達サービス」を自動設定（未選択時のみ）
        if (!savedCargo1) {
          $cargo1.val('005:指定日配達サービス');
        }
      } else {
        $('#cargo3Container').hide();
        $cargo3.val('');
      }

      // 自動設定ロジックを呼び出し
      updateCargoByConditions();

      // コピー/編集で渡された配達時間帯・送り状種別・クール区分を復元（.html()差し替えでvalueがリセットされるため）
      if (savedDeliveryTime) {
        $deliveryTime.val(savedDeliveryTime);
      }
      if (savedInvoiceType) {
        $invoiceType.val(savedInvoiceType);
      }
      if (savedCoolCls) {
        $coolCls.val(savedCoolCls);
      }
      // コピー/編集で渡された荷扱い２・３を復元（画面上に正しく表示されるようにする）
      if (savedCargo2) {
        $cargo2.val(savedCargo2);
      }
      if (savedCargo3) {
        $cargo3.val(savedCargo3);
      }
      if (savedCargo1) {
        $cargo1.val(savedCargo1);
      }

      // 西濃運輸: 送り状種別・クール区分を非表示、重量を表示
      if (val1 && val1.includes('西濃')) {
        $('#invoiceTypeCoolRow').hide();
        $('#shippingWeightRow').show();
      } else {
        $('#invoiceTypeCoolRow').show();
        $('#shippingWeightRow').hide();
        $('#shippingWeight').val('');
      }
    }

    /**
     * 納品方法・送り状種別・クール区分に応じて荷扱いを自動設定
     *
     * 佐川急便選択時に、条件に応じた荷扱いオプションを自動設定します。
     * 受注完了画面の修正で追加されたビジネスロジックです。
     *
     * 自動設定ルール:
     * 1. クール区分が「冷蔵」→ 荷扱い２に「冷蔵」を自動設定
     * 2. クール区分が「冷凍」→ 荷扱い２に「冷凍」を自動設定
     * 3. 送り状種別が「着払」→ 荷扱い３に「eコレクト（現金）」を自動設定
     *
     * 適用条件:
     * - 納品方法に「佐川」が含まれる場合のみ
     *
     * 呼び出し元:
     * - deliveryMethodChange() - 納品方法変更時
     * - クール区分・送り状種別変更時（onChange属性）
     *
     * @returns {void}
     * @see deliveryMethodChange() - 納品方法変更処理
     */
    function updateCargoByConditions() {
      var deliveryMethod = $('select[id="deliveryMethod"]').val();
      var invoiceType = $('select[id="invoiceType"]').val();
      var coolCls = $('select[id="coolCls"]').val();

      // 佐川の場合のみ処理
      if (deliveryMethod && deliveryMethod.includes('佐川')) {
        // 荷扱い２：クール区分が冷蔵/冷凍の場合、該当する option（種別値はシートで可変のため表示で判定）を選択
        if (coolCls) {
          var $cargo2 = $('select[id="cargo2"]');
          var targetLabel = null;
          if (coolCls.indexOf('冷蔵') !== -1) targetLabel = '冷蔵';
          else if (coolCls.indexOf('冷凍') !== -1) targetLabel = '冷凍';
          if (targetLabel) {
            $cargo2.find('option').each(function () {
              var v = $(this).val(), t = $(this).text();
              if (v && (t.indexOf(targetLabel) !== -1 || (v.split(':')[1] && v.split(':')[1].indexOf(targetLabel) !== -1))) {
                $cargo2.val(v);
                return false;
              }
            });
          }
        }

        // 荷扱い３：送り状種別が着払いの場合、eコレクトを自動設定
        if (invoiceType && invoiceType.includes('着払')) {
          $('select[id="cargo3"]').val('008:ｅコレクト（現金）');
        }
      }
    }
    function companyChange() {
      $('button[id="companyBtn"]').text('反映中..');
      google.script.run.withSuccessHandler(companyChangeSuccess).getCompanyRecordForShipping();
    }
    function companyChangeSuccess(datas) {
      var data = JSON.parse(datas);
      $('input[id="shippingFromName"]').val(data[0]['名前']);
      $('input[id="shippingFromZipcode"]').val(data[0]['郵便番号']);
      $('input[id="shippingFromAddress"]').val(data[0]['住所']);
      $('input[id="shippingFromTel"]').val(data[0]['電話番号']);
      var companyDisplayName = '<?= getCompanyDisplayName() ?>';
      $('button[id="companyBtn"]').text(companyDisplayName);
    }
    /**
     * 依頼先（顧客）情報を発送元にコピー
     *
     * 依頼先の会社名・郵便番号・住所・電話番号を発送元フィールドにコピーします。
     * 「依頼先コピー」ボタンのクリックで実行されます。
     *
     * コピー対象:
     * - 会社名
     * - 郵便番号
     * - 住所
     * - 電話番号
     *
     * @returns {void}
     * @see sendCopy() - 発送先コピー
     */
    function custCopy() {
      $('input[id="shippingFromName"]').val($('input[id="customerName"]').val());
      $('input[id="shippingFromZipcode"]').val($('input[id="customerZipcode"]').val());
      $('input[id="shippingFromAddress"]').val($('input[id="customerAddress"]').val());
      $('input[id="shippingFromTel"]').val($('input[id="customerTel"]').val());
    }

    /**
     * 発送先情報を発送元にコピー
     *
     * 発送先の会社名・郵便番号・住所・電話番号を発送元フィールドにコピーします。
     * 「発送先コピー」ボタンのクリックで実行されます。
     *
     * コピー対象:
     * - 会社名
     * - 郵便番号
     * - 住所
     * - 電話番号
     *
     * @returns {void}
     * @see custCopy() - 依頼先コピー
     */
    function sendCopy() {
      $('input[id="shippingFromName"]').val($('input[id="shippingToName"]').val());
      $('input[id="shippingFromZipcode"]').val($('input[id="shippingToZipcode"]').val());
      $('input[id="shippingFromAddress"]').val($('input[id="shippingToAddress"]').val());
      $('input[id="shippingFromTel"]').val($('input[id="shippingToTel"]').val());
    }

    /**
     * 依頼先（顧客）情報を発送先にコピー
     *
     * 依頼先の会社名・郵便番号・住所・電話番号を発送先フィールドにコピーします。
     * 「発送先同上」チェックボックスや、顧客ダイアログの「発送先同上」チェックで実行されます。
     *
     * コピー対象:
     * - 会社名
     * - 郵便番号
     * - 住所
     * - 電話番号
     *
     * 使用場面:
     * - 顧客と発送先が同一の場合
     *
     * @returns {void}
     * @see addCustomer() - 顧客新規登録（発送先同上チェックあり）
     */
    function customerSame() {
      $('input[id="shippingToName"]').val($('input[id="customerName"]').val());
      $('input[id="shippingToZipcode"]').val($('input[id="customerZipcode"]').val());
      $('input[id="shippingToAddress"]').val($('input[id="customerAddress"]').val());
      $('input[id="shippingToTel"]').val($('input[id="customerTel"]').val());
    }
    // 顧客・発送先ダイアログ、検索機能は分割ファイルに移動（shippingCustomerScript.html, shippingSearchScript.html）
    // 顧客・発送先検索機能は shippingSearchScript.html に分離済み
    function setProductSearch() {
      if (!$('input[id="shippingToName"]').val()) {
        showWarningToast('発送先名が入力されていません。');
        return false;
      }
      $("button[id='productSearch']").html('<span class="btn-spinner"></span> 検索中...');
      var shippingToName = $('input[id="shippingToName"]').val();
      google.script.run.withSuccessHandler(setDataList).withFailureHandler(dataAddFail).getLastData(shippingToName);

    }
    function setQuotationSearch() {
      if (!$('input[id="customerName"]').val()) {
        showWarningToast('顧客名が入力されていません。');
        return false;
      }
      $("button[id='quotationSearch']").html('<span class="btn-spinner"></span> 検索中...');
      var customerName = $('input[id="customerName"]').val();
      google.script.run.withSuccessHandler(setQuotationDataList).withFailureHandler(dataAddFail).getQuotationData(customerName);

    }

    function setDataList(datas) {
      var res = JSON.parse(datas);
      if (res.length == 0) {
        showInfoToast('対象データがありませんでした。');
      }
      else {
        $('input[id="shippingToName"]').val(res[0]['発送先名']);
        $('input[id="shippingToZipcode"]').val(res[0]['発送先郵便番号']);
        $('input[id="shippingToAddress"]').val(res[0]['発送先住所']);
        $('input[id="shippingToTel"]').val(res[0]['発送先電話番号']);
        $('input[id="shippingFromName"]').val(res[0]['発送元名']);
        $('input[id="customerName"]').val(res[0]['顧客名']);
        $('input[id="customerZipcode"]').val(res[0]['顧客郵便番号']);
        $('input[id="customerAddress"]').val(res[0]['顧客住所']);
        $('input[id="customerTel"]').val(res[0]['顧客電話番号']);
        $('input[id="shippingFromName"]').val(res[0]['発送元名']);
        $('input[id="shippingFromZipcode"]').val(res[0]['発送元郵便番号']);
        $('input[id="shippingFromAddress"]').val(res[0]['発送元住所']);
        $('input[id="shippingFromTel"]').val(res[0]['発送元電話番号']);
        $('select[id="deliveryMethod"]').val(res[0]['納品方法']);
        deliveryMethodChange();
        $('select[id="deliveryTime"]').val(res[0]['配達時間帯']);
        if (res[0]['納品書'] == '○') {
          $('input[id="deliveryChk"]').prop('checked', true);
        }
        if (res[0]['請求書'] == '○') {
          $('input[id="billChk"]').prop('checked', true);
        }
        if (res[0]['領収書'] == '○') {
          $('input[id="receiptChk"]').prop('checked', true);
        }
        if (res[0]['パンフ'] == '○') {
          $('input[id="pamphletChk"]').prop('checked', true);
        }
        if (res[0]['レシピ'] == '○') {
          $('input[id="recipeChk"]').prop('checked', true);
        }
        $('input[id="otherAttach"]').val(res[0]['その他添付']);
        $('select[id="invoiceType"]').val(res[0]['送り状種別']);
        $('select[id="coolCls"]').val(res[0]['クール区分']);
        $('select[id="cargo1"]').val(res[0]['荷扱い１']);
        $('select[id="cargo2"]').val(res[0]['荷扱い２']);
        $('select[id="cargo3"]').val(res[0]['荷扱い３']);
        $('input[id="cashOnDelivery"]').val(res[0]['代引総額']);
        $('input[id="cashOnDeliTax"]').val(res[0]['代引内税']);
        $('input[id="copiePrint"]').val(res[0]['発行枚数']);
        $('textarea[id="internalMemo"]').val(res[0]['社内メモ'] || '');
        $('textarea[id="csvmemo"]').val(res[0]['送り状備考欄'] || '');
        $('textarea[id="deliveryMemo"]').val(res[0]['納品書備考欄'] || '');
        $('textarea[id="memo"]').val(res[0]['メモ'] || '');
        for (let i = 0; i < 10; i++) {
          var num = (i + 1);
          var bunrui = 'bunrui' + num;
          var product = 'product' + num;
          var quantity = 'quantity' + num;
          var price = 'price' + num;
          if (res.length > i) {
            var spData = res[i];
            $('select[id="' + bunrui + '"]').val(spData['商品分類']);
            bunruiChange(num);
            $('select[id="' + product + '"]').val(spData['商品名']);
            productChange(num);
            $('select[id="' + quantity + '"]').val(spData['受注数']);
            $('input[id="' + price + '"]').val(spData['販売価格']);
          }
          else {
            $('select[id="' + bunrui + '"]').val('');
            bunruiChange(num);
            $('select[id="' + product + '"]').val('');
            productChange(num);
            $('select[id="' + quantity + '"]').val('');
            $('input[id="' + price + '"]').val('');
          }
        }
        showSuccessToast('前回の商品情報を反映しました。');
      }
      $("button[id='productSearch']").text('前回商品反映');
    }
    function setQuotationDataList(datas) {
      var res = JSON.parse(datas);
      for (let i = 0; i < 10; i++) {
        var num = (i + 1);
        var bunrui = 'bunrui' + num;
        var product = 'product' + num;
        var quantity = 'quantity' + num;
        var price = 'price' + num;
        if (res.length > i) {
          var spData = res[i];
          $('select[id="' + bunrui + '"]').val(spData['商品分類']);
          bunruiChange(num);
          $('select[id="' + product + '"]').val(spData['商品名']);
          productChange(num);
          $('input[id="' + price + '"]').val(spData['単価（外税）']);
        }
        else {
          $('select[id="' + bunrui + '"]').val('');
          bunruiChange(num);
          $('select[id="' + product + '"]').val('');
          productChange(num);
          $('select[id="' + quantity + '"]').val('');
          $('input[id="' + price + '"]').val('');
        }
      }
      if (res.length == 0) {
        showInfoToast('対象データがありませんでした。');
      }
      else {
        showSuccessToast('見積書情報を反映しました。');
      }
      $("button[id='quotationSearch']").text('見積書反映');
    }
