  <style>
    /* 文字を折り返す */
    .cell-wrap {
      white-space: normal !important;
      word-wrap: break-word;
      word-break: break-all;
      line-height: 1.3;
      text-align: left;
      padding: 0.375rem 0.75rem;
    }

    /* 商品名の列幅を広げる */
    .product-name-td {
      min-width: 120px;
      width: 50%;
      /* テーブル幅の50% */
    }

    /* スマホ用 */
    @media (max-width: 768px) {
      .table {
        font-size: 0.85rem;
        /* 少し文字を小さく */
      }

      .cell-wrap {
        padding: 0.25rem 0.5rem;
        /* パディングを減らす */
      }
    }

    /* アコーディオンメニュー */
    .menu-accordion {
      max-width: 400px;
      margin: 0 auto;
    }

    .menu-section {
      margin-bottom: 8px;
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }

    .menu-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 18px;
      background: linear-gradient(135deg, #4a90a4 0%, #3d7a8c 100%);
      color: #fff;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      user-select: none;
      transition: background 0.2s;
    }

    .menu-header:hover {
      background: linear-gradient(135deg, #3d7a8c 0%, #2d6a7c 100%);
    }

    .menu-header-util {
      background: linear-gradient(135deg, #6b7280 0%, #4b5563 100%);
    }

    .menu-header-util:hover {
      background: linear-gradient(135deg, #4b5563 0%, #374151 100%);
    }

    .menu-arrow {
      font-size: 0.7rem;
      transition: transform 0.3s ease;
    }

    .menu-header.collapsed .menu-arrow {
      transform: rotate(-90deg);
    }

    .menu-content {
      max-height: 0;
      overflow: hidden;
      padding: 0 8px;
      background: #f8fafc;
      transition: max-height 0.3s ease, padding 0.3s ease;
    }

    .menu-content.show {
      max-height: 1000px;
      padding: 8px;
    }

    .menu-btn {
      display: block;
      width: 100%;
      padding: 12px 16px;
      margin-bottom: 6px;
      background: #fff;
      color: #374151;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      text-align: left;
      transition: all 0.2s;
    }

    .menu-btn:last-child {
      margin-bottom: 0;
    }

    .menu-btn:hover {
      background: #4a90a4;
      color: #fff;
      border-color: #4a90a4;
      transform: translateX(4px);
    }

    .menu-btn-sub {
      display: block;
      width: 100%;
      padding: 10px 16px;
      margin-bottom: 4px;
      background: #fff;
      color: #6b7280;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 500;
      text-align: left;
      transition: all 0.2s;
    }

    .menu-btn-sub:last-child {
      margin-bottom: 0;
    }

    .menu-btn-sub:hover {
      background: #7c9a6e;
      color: #fff;
      border-color: #7c9a6e;
    }

    .menu-btn-util {
      display: block;
      width: 100%;
      padding: 10px 16px;
      background: #f3f4f6;
      color: #6b7280;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 500;
      text-align: left;
      transition: all 0.2s;
    }

    .menu-btn-util:hover {
      background: #6b7280;
      color: #fff;
    }

    /* スキャナー関連スタイル */
    /* Bootstrap 5.0.2対応: modal-fullscreenのflexbox修正 */
    #scannerModal .modal-content {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    #scannerView {
      width: 100%;
      height: 100%;
      background-color: #000;
    }

    #scannerView video,
    #scannerView canvas {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .scanner-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
      display: flex;
    }

    .scanner-region {
      border: 3px solid #0d6efd;
      width: 80%;
      height: 30%;
      margin: auto;
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5);
      position: relative;
    }

    .scanner-region::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      width: 100%;
      height: 2px;
      background: rgba(255, 0, 0, 0.5);
      box-shadow: 0 0 10px red;
      animation: scan-line 2s infinite ease-in-out;
    }

    @keyframes scan-line {

      0%,
      100% {
        transform: translateY(-50px);
      }

      50% {
        transform: translateY(50px);
      }
    }

    .scanner-result-overlay,
    .scanner-error-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2000;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      text-align: center;
    }

    .scanner-result-overlay {
      background: rgba(25, 135, 84, 0.95);
    }

    .scanner-error-overlay {
      background: rgba(220, 53, 69, 0.95);
    }

    .manual-input-area {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      z-index: 15;
      display: none;
      flex-direction: column;
      justify-content: center;
    }

    /* 予定日超過カード（受注一覧と同様） */
    .order-card.overdue-row {
      background-color: #ffebee !important;
      border-left: 4px solid #f44336;
    }

    .order-card.overdue-row .order-card-title,
    .order-card.overdue-row .order-card-customer {
      color: #c62828;
    }

    /* 収穫待ち一覧ダイアログ：コンパクト表形式（PC・スマホ両対応） */
    .harvest-waiting-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .harvest-waiting-row {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      gap: 0.5rem 1rem;
      padding: 0.6rem 0.75rem;
      background: #fffef8;
      border: 1px solid #fef3c7;
      border-radius: 8px;
      font-size: 0.875rem;
    }

    .harvest-waiting-left {
      flex: 0 1 auto;
      min-width: 0;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.35rem 0.75rem;
    }

    .harvest-waiting-name {
      font-weight: 600;
      color: #1e293b;
    }

    .harvest-waiting-client {
      font-size: 0.8rem;
      color: #64748b;
    }

    .harvest-waiting-cool {
      flex-shrink: 0;
    }

    .harvest-waiting-right {
      flex: 1 1 200px;
      min-width: 0;
      color: #475569;
      word-break: break-all;
      line-height: 1.4;
    }

    @media (min-width: 576px) {
      .harvest-waiting-row {
        flex-wrap: nowrap;
      }

      .harvest-waiting-left {
        flex: 0 0 220px;
      }

      .harvest-waiting-right {
        flex: 1;
        min-width: 180px;
      }
    }

    /* 収穫待ちモーダル：発送商品詳細が少し狭まった程度の横幅まで広げる */
    .harvest-waiting-modal {
      width: 96vw;
      max-width: 1120px;
    }

    .harvest-waiting-modal #harvestWaitingDialogBody {
      max-height: 60vh;
    }
  </style>
</head>

  <script>

    // アコーディオン開閉
    function toggleSection(header) {
      const content = header.nextElementSibling;
      const isOpen = content.classList.contains('show');

      if (isOpen) {
        content.classList.remove('show');
        header.classList.add('collapsed');
      } else {
        content.classList.add('show');
        header.classList.remove('collapsed');
      }
    }

    // デザインシステムテストページを開く
    function openTestComponents() {
      const currentUrl = window.location.href.split('?')[0];
      window.open(currentUrl + '?test=components', '_blank');
    }

    // マスターデータキャッシュ更新
    function refreshMasterCache() {
      const btn = document.getElementById('refreshCacheBtn');
      btn.disabled = true;
      btn.textContent = '🔄 更新中...';

      google.script.run
        .withSuccessHandler(function (result) {
          btn.disabled = false;
          btn.textContent = '🔄 キャッシュ更新';
          if (result.success) {
            showSuccessToast('✅ ' + result.message + '\n商品数: ' + result.productCount + '件');
          } else {
            showErrorToast('❌ ' + result.message);
          }
        })
        .withFailureHandler(function (e) {
          btn.disabled = false;
          btn.textContent = '🔄 キャッシュ更新';
          showErrorToast('❌ キャッシュ更新に失敗しました: ' + e.message);
        })
        .refreshMasterDataCache();
    }

    function sendFail() {
      showErrorToast("処理に失敗しました。");
    }
    function sendSuccess(url) {
      window.open(url);
    }
    function setRes() {
      $("#cntRes").html('<div class="inline-spinner" style="padding: 20px; text-align: center;"><div class="mini-spinner"></div><span>読み込み中...</span></div>');
      google.script.run.withSuccessHandler(setTable).withFailureHandler(setTableFail).selectShippingDate();
    }
    function setTable(datas) {
      var res = JSON.parse(datas);
      window.harvestWaitingList = (res[12] != null) ? res[12] : [];
      $("#cntRes").html("");
      let cntHtml = `<table class="table table-bordered text-center" style="table-layout: fixed;">`;
      cntHtml += `<thead><tr>`;

      // ヘッダー行 - 今日は緑、他はブルーグレー系
      cntHtml += `<th class="today_color" scope="col">${res[0]['今日']}</th>`;
      cntHtml += `<th style="background-color: #B0E0E6;" scope="col">${res[0]['明日']}</th>`;
      cntHtml += `<th style="background-color: #B0E0E6;" scope="col">${res[0]['明後日']}</th>`;
      cntHtml += `<th style="background-color: #B0E0E6;" scope="col">${res[0]['明々後日']}</th>`;
      cntHtml += `</tr></thead><tbody><tr>`;

      // 件数行
      cntHtml += `<td scope="col">${res[1]['今日']}件</td>`;
      cntHtml += `<td scope="col">${res[1]['明日']}件</td>`;
      cntHtml += `<td scope="col">${res[1]['明後日']}件</td>`;
      cntHtml += `<td scope="col">${res[1]['明々後日']}件</td>`;
      cntHtml += `</tr></tbody></table>`;

      // ステータスバッジ表示エリア（テーブルの下に表示）
      let statusBadges = '';
      const overdueCount = res[1]['超過'] || 0;
      const harvestWaitingCount = res[1]['収穫待ち'] || 0;

      if (overdueCount > 0) {
        statusBadges += `<span class="badge bg-danger me-2" style="font-size:0.85rem;">
                    <i class="bi bi-exclamation-circle-fill me-1"></i>発送日超過: ${overdueCount}件
                </span>`;
      }

      if (harvestWaitingCount > 0) {
        statusBadges += `<span class="badge bg-warning text-dark me-2" style="font-size:0.85rem; cursor:pointer;" role="button" tabindex="0" onclick="showHarvestWaitingDialog()" onkeydown="if(event.key==='Enter')showHarvestWaitingDialog()" title="クリックで収穫待ち一覧を表示">
                    <i class="bi bi-flower1 me-1"></i>収穫待ち: ${harvestWaitingCount}件
                </span>`;
      }

      if (statusBadges) {
        statusBadges = `<div class="mt-2 text-center">${statusBadges}</div>`;
      }

      $("#cntRes").html(cntHtml + statusBadges);
      if (res[4]) {
        createInvoiceHtml(res[4], res[0]['今日'], "#invoiceTodayRes", true);
      }
      else {
        $("#invoiceTodayRes").html('');
      }
      if (res[5]) {
        createProductHtml(res[5], res[0]['今日'], "#todayRes", true);
      }
      else {
        $("#todayRes").html('');
      }
      if (res[6]) {
        createInvoiceHtml(res[6], res[0]['明日'], "#invoiceTommorrowRes");
      }
      else {
        $("#invoiceTommorrowRes").html('');
      }
      if (res[7]) {
        createProductHtml(res[7], res[0]['明日'], "#tommorrowRes");
      }
      else {
        $("#tommorrowRes").html('');
      }
      if (res[8]) {
        createInvoiceHtml(res[8], res[0]['明後日'], "#invoiceDayAfter2Res");
      }
      else {
        $("#invoiceDayAfter2Res").html('');
      }
      if (res[9]) {
        createProductHtml(res[9], res[0]['明後日'], "#dayAfter2Res");
      }
      else {
        $("#dayAfter2Res").html('');
      }
      if (res[10]) {
        createInvoiceHtml(res[10], res[0]['明々後日'], "#invoiceDayAfter3Res");
      }
      else {
        $("#invoiceDayAfter3Res").html('');
      }
      if (res[11]) {
        createProductHtml(res[11], res[0]['明々後日'], "#dayAfter3Res");
      }
      else {
        $("#dayAfter3Res").html('');
      }
    }
    function setTableFail() {
      showErrorToast("受注データ集計処理に失敗しました。");
    }
    // 詳細ダイアログを表示する関数
    function showDetailDialog(details) {
      document.getElementById('dialogCustName').textContent = details.custName;
      document.getElementById('dialogShippingTo').textContent = details.shippingTo;
      document.getElementById('dialogProduct').textContent = details.product;
      document.getElementById('dialogCount').textContent = details.count;
      document.getElementById('dialogMemo').textContent = details.memo;

      document.getElementById('overlay').style.display = 'block'; // オーバーレイを表示
      document.getElementById('detailDialog').style.display = 'block'; // ダイアログを表示
    }

    // 詳細ダイアログを閉じるボタンのクリックイベント
    document.getElementById('closeDialogButton').addEventListener('click', function () {
      document.getElementById('detailDialog').style.display = 'none'; // ダイアログを非表示
      document.getElementById('overlay').style.display = 'none'; // オーバーレイを非表示
    });

    function showHarvestWaitingDialog() {
      const list = window.harvestWaitingList || [];
      const body = document.getElementById('harvestWaitingDialogBody');
      if (!list.length) {
        body.innerHTML = '<p class="text-muted mb-0">収穫待ちの受注はありません。</p>';
      } else {
        // 発送商品詳細と同じカード形式で表示
        let html = '<div class="dashboard-grid">';
        for (let i = 0; i < list.length; i++) {
          const order = list[i];
          const coolCls = order['クール区分'] || '';
          let coolBadge = '';
          if (coolCls.includes('冷蔵')) coolBadge = '<span class="cool-badge cool-badge-reizo">冷蔵</span>';
          else if (coolCls.includes('冷凍')) coolBadge = '<span class="cool-badge cool-badge-reito">冷凍</span>';
          else if (coolCls && coolCls !== 'なし' && coolCls !== '常温') coolBadge = '<span class="cool-badge bg-warning text-dark" style="font-size:0.6rem">' + escapeHtml(coolCls) + '</span>';
          const statusBadgeHtml = getStatusBadge('収穫待ち');
          const escapedOrderId = escapeHtml(order.orderId);
          const escapedRecipientName = escapeHtml(order['発送先名'] || '');
          const escapedDeliveryMethod = escapeHtml(order.deliveryMethod || '');
          const actionsHtml = `
            <div class="order-card-actions" style="flex-direction: column; gap: 5px; align-items: stretch;">
              <select class="form-select form-select-sm status-select" data-order-id="${escapedOrderId}" data-delivery-method="${escapedDeliveryMethod}" style="font-size: 0.65rem; padding: 1px 2px; width: 100%; min-width: 70px; text-align: center;">
                <option value="発送前">発送前</option>
                <option value="収穫待ち" selected>🌱待ち</option>
                <option value="出荷済み">✓済</option>
              </select>
              <button type="button" class="btn btn-sm scan-btn-mini" data-order-id="${escapedOrderId}" data-recipient-name="${escapedRecipientName}" data-delivery-method="${escapedDeliveryMethod}" title="伝票スキャン" style="width: 100%;">
                <i class="bi bi-upc-scan"></i>
              </button>
              ${statusBadgeHtml}
            </div>
          `;
          html += `<div class="order-card shadow-sm border-warning border-opacity-50">`;
          html += `<div class="order-card-header"><div class="order-card-info-main">`;
          html += `<h4 class="order-card-title">${escapeHtml(order['発送先名'] || '')} 様</h4>`;
          html += `<span class="order-card-customer">依頼主: ${escapeHtml(order['顧客名'] || '')}</span>`;
          if (coolBadge) html += `<div class="mt-1">${coolBadge}</div>`;
          html += `</div>`;
          html += actionsHtml;
          html += `</div>`;
          html += `<div class="order-card-body">`;
          let combinedMemo = order['aggregatedMemos'] && Array.isArray(order['aggregatedMemos']) ? order['aggregatedMemos'].map(m => escapeHtml(String(m == null ? '' : m))) : [];
          if (combinedMemo.length === 0) {
            const seenMemos = new Set();
            for (let j = 0; j < (order['商品'] || []).length; j++) {
              const p = order['商品'][j];
              if (p['メモ']) {
                const rawMemo = String(p['メモ']).trim();

    function initQuagga() {
      isScannerProcessing = false;
      if (typeof Quagga !== 'undefined') {
        Quagga.init({
          inputStream: {
            name: "Live",
            type: "LiveStream",
            target: document.querySelector('#scannerView'),

          if (err) {
            showScannerError("カメラの起動に失敗しました。");

          }
          Quagga.start();
          // Remove any previously registered handler before adding a new one
          if (Quagga.offDetected) {
            Quagga.offDetected(onQuaggaDetected);
          }
          // Register the handler only after successful initialization
          if (Quagga.onDetected) {
            Quagga.onDetected(onQuaggaDetected);
          }
        });
      }
    }

    function onQuaggaDetected(data) {
      if (isScannerProcessing) return;
      const code = data.codeResult.code;

      // 納品方法に応じた桁数チェック
      const deliveryMethod = currentScanDeliveryMethod || '';
      let expectedLength = 0;
      let carrierName = '';

      if (deliveryMethod.includes('ヤマト')) {
        expectedLength = 12;
        carrierName = 'ヤマト';
      } else if (deliveryMethod.includes('佐川')) {
        expectedLength = 12;
        carrierName = '佐川';
      } else if (deliveryMethod.includes('西濃')) {
        expectedLength = 10;
        carrierName = '西濃運輸';
      }

      // 桁数チェック（納品方法が特定できる場合）
      if (expectedLength > 0 && code && code.length !== expectedLength) {
        document.getElementById('scannerStatus').innerText =
          `${carrierName}の送り状番号は${expectedLength}桁です。再度読み取ってください。(現在: ${code.length}桁)`;
        setTimeout(() => {
          document.getElementById('scannerStatus').innerText = "バーコードを枠内に収めてください";
        }, 3000);
        return;
      }

      // 簡易バリデーション: 10-12桁
      if (code && (code.length >= 10 && code.length <= 12)) {
        // 日本の電話番号を誤検知しないための対策
        // 電話番号パターン: 0から始まり、10桁または11桁、数字のみ
        if (isJapanesePhoneNumber(code)) {
          return; // 電話番号と判定された場合はスキップ
        }
        isScannerProcessing = true;
        handleScannerSuccess(code);
      }
    }

    // 日本の電話番号かどうかを判定する関数
    function isJapanesePhoneNumber(code) {
      if (!code || typeof code !== 'string') return false;

      // 10桁または11桁で、0から始まる数字のみ
      if ((code.length === 10 || code.length === 11) && code.startsWith('0')) {
        // 数字のみかチェック
        if (!/^\d+$/.test(code)) return false;

        // 日本の電話番号の主要パターン
        // 固定電話: 0X-XXXX-XXXX (10桁) または 0XX-XXXX-XXXX (11桁)
        // 携帯電話: 090-XXXX-XXXX, 080-XXXX-XXXX, 070-XXXX-XXXX (11桁)
        // IP電話: 050-XXXX-XXXX (11桁)

        // 10桁の場合: 0X-XXXX-XXXX 形式（固定電話）
        if (code.length === 10) {
          // 2桁目のエリアコードが0-9で、全体が数字
          return /^0[1-9]\d{8}$/.test(code);
        }

        // 11桁の場合: 携帯電話、IP電話、または長距離固定電話
        if (code.length === 11) {
          // 携帯電話: 090, 080, 070 で始まる
          if (/^0[789]0\d{8}$/.test(code)) return true;
          // IP電話: 050 で始まる
          if (/^050\d{8}$/.test(code)) return true;
          // 固定電話（長距離）: 0XX-XXXX-XXXX 形式
          if (/^0[1-9]\d{9}$/.test(code)) return true;
        }

        return false;
      }

      return false;
    }

    function handleScannerSuccess(code) {
      document.getElementById('scannerBeepSound').play();
      document.getElementById('modalScannedNo').innerText = code;
      document.getElementById('scannerSuccessOverlay').style.display = 'flex';

      google.script.run

              setRes();
            }, 1000);
          } else showScannerError(res.message);
        })
        .updateOrderTrackingStatus(currentScanOrderId, code);
    }

    async function captureAndOcrModal() {
      if (isScannerProcessing) return;
      isScannerProcessing = true;
      document.getElementById('scannerStatus').innerText = "画像を解析中...";
      try {
        const video = document.querySelector('#scannerView video');
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        const base64Data = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];

        google.script.run
          .withSuccessHandler(res => {
            if (res.success) handleScannerSuccess(res.code);
            else {
              isScannerProcessing = false;
              showWarningToast("認識不可: " + res.message);
              document.getElementById('scannerStatus').innerText = "バーコードを枠内に収めてください";
            }
          })
          .withFailureHandler(() => {
            isScannerProcessing = false;
            showErrorToast("OCRエラー");
          })
          .recognizeTrackingNumber(base64Data);
      } catch (e) {
        isScannerProcessing = false;
        showErrorToast("キャプチャ失敗");
      }
    }

    function showScannerError(msg) {

            <h3 class="text-center mb-4">送り状番号を入力</h3>
            <div class="input-group input-group-lg mb-4">
              <input type="tel" id="modalManualNo" class="form-control text-center" placeholder="123456789012"
                maxlength="12">
            </div>
            <div class="d-grid gap-3">
              <button onclick="submitModalManual()" class="btn btn-primary py-3">決定</button>
              <button onclick="toggleModalManual(false)" class="btn btn-outline-light">スキャンに戻る</button>
            </div>
          </div>
        </div>
        <div class="modal-footer flex-column bg-black border-0 p-3">
          <div id="scannerStatus" class="mb-3">バーコードを枠内に収めてください</div>
          <div class="d-flex gap-2 w-100 mb-2">
            <button onclick="captureAndOcrModal()" class="btn btn-warning flex-grow-1 py-3 text-dark">
              <i class="bi bi-camera"></i> 写真で読み取る
            </button>
          </div>
          <div class="d-flex gap-2 w-100">
            <button onclick="toggleModalManual(true)" class="btn btn-primary flex-grow-1 py-3">
              <i class="bi bi-keyboard"></i> 手入力
            </button>
            <button type="button" class="btn btn-outline-light py-3 px-4" data-bs-dismiss="modal">キャンセル</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 成功・エラー時のオーバーレイ -->
  <div id="scannerSuccessOverlay" class="scanner-result-overlay">
    <h2 class="mb-3">スキャン成功！</h2>
    <div id="modalScannedNo" class="h1 mb-4"></div>
    <div class="spinner-border text-light mb-3" role="status"></div>
    <div>システム更新中...</div>
  </div>
  <div id="scannerErrorOverlay" class="scanner-error-overlay">
    <h2 class="mb-3">エラー</h2>
    <div id="scannerErrorMsg" class="mb-4"></div>
    <button onclick="retryScanner()" class="btn btn-light px-5">再試行</button>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- 編集モーダル -->
  <div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">注文内容の編集</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="editOrderId">

          <div class="mb-3">
            <label for="editShippingDate" class="form-label">発送日</label>
            <input type="date" class="form-control" id="editShippingDate">
          </div>

          <div class="mb-3">
            <label class="form-label">商品・数量</label>
            <select class="form-select mb-2" id="editProductSelect" onchange="onEditProductChange()">
              <!-- JSで生成 -->
            </select>
            <input type="number" class="form-control" id="editQuantity" step="0.1">
            <div class="form-text">未定の場合は空白にするか、数値を入力してください。</div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
          <button type="button" class="btn btn-primary" onclick="submitEditOrder()">保存</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 編集モーダル関連
    let currentProductData = [];

    function openEditModal(orderId, productJson, currentDate) {
      document.getElementById('editOrderId').value = orderId;
      document.getElementById('editShippingDate').value = currentDate;

      try {
        currentProductData = JSON.parse(productJson);
      } catch (e) {
        currentProductData = [];
      }

      const select = document.getElementById('editProductSelect');
      select.innerHTML = '';

      currentProductData.forEach((p, index) => {
        const option = document.createElement('option');
        option.value = index;
        option.text = p.name;
        select.appendChild(option);
      });

      if (currentProductData.length > 0) {
        // 初期選択
        document.getElementById('editQuantity').value = currentProductData[0].count;
      }

      const modal = new bootstrap.Modal(document.getElementById('editModal'));
      modal.show();
    }

    function onEditProductChange() {
      const index = document.getElementById('editProductSelect').value;
      if (currentProductData[index]) {
        document.getElementById('editQuantity').value = currentProductData[index].count;
      }
    }

    function submitEditOrder() {
      const orderId = document.getElementById('editOrderId').value;
      const newDate = document.getElementById('editShippingDate').value;

      const index = document.getElementById('editProductSelect').value;
      const product = currentProductData[index];
      if (!product) return;

      const newQuantity = document.getElementById('editQuantity').value;

      // ローディング表示等は省略し、即実行
      google.script.run
        .withSuccessHandler(() => {
          bootstrap.Modal.getInstance(document.getElementById('editModal')).hide();
          setRes(); // リロード
        })
        .withFailureHandler((e) => {
          showErrorToast('更新エラー: ' + e.message);
        })
        .updateOrderDateAndQuantity(orderId, product.name, newDate, newQuantity);
    }
  </script>
  <div id="loadingOverlay"
    style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9999; justify-content:center; align-items:center; flex-direction:column;">
    <div class="spinner-border text-light" role="status" style="width: 3rem; height: 3rem;">
      <span class="visually-hidden">Loading...</span>
    </div>
    <div class="mt-2 text-white fw-bold">処理中...</div>
  </div>
</body>

</html>
